<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>34인치 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 34인치 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 18px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 30px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 28px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 20px;
    }

    fieldset:last-of-type { margin-bottom: 16px; }

    legend {
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 16px;
      line-height: 1.35;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .options.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .radio { position: relative; }
    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label {
      outline: 0;
      box-shadow: 0 0 0 4px var(--ring);
    }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin: 7px 2px 0;
    }

    .hint.dynamic:empty { display: none; }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .msg {
      font-size: 13px;
      color: #a40000;
    }

    footer {
      text-align: center;
      padding: 10px 16px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 640px) {
      header { padding: 22px 16px 12px; }
      .container {
        width: min(520px, 94vw);
        margin-bottom: 22px;
        padding: 16px;
        border-radius: 14px;
      }
      fieldset { margin-bottom: 17px; }
      legend { font-size: 15px; margin-bottom: 9px; }
      .options,
      .options.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .options.three-mobile {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .radio label {
        min-height: 42px;
        padding: 10px 8px;
        border-radius: 11px;
        font-size: 14px;
      }
      .hint {
        font-size: 12px;
        line-height: 1.4;
        margin-top: 6px;
      }
      .actions {
        margin-top: 10px;
        justify-content: stretch;
      }
      .msg { width: 100%; }
      button.primary {
        width: 100%;
        padding: 13px 16px;
      }
      footer { padding-bottom: 18px; }
    }

    @media (max-width: 380px) {
      .options.three-mobile {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>34인치 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 모니터의 주 사용 용도는 무엇인가요?</legend>
          <div class="options three-mobile" role="radiogroup" aria-label="모니터 주 사용 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-game" name="purpose" value="game">
              <label for="purpose-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-work" name="purpose" value="work">
              <label for="purpose-work">업무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-all" name="purpose" value="all">
              <label for="purpose-all">전부</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 커브드는 어느 정도를 원하나요?</legend>
          <div class="options two" role="radiogroup" aria-label="커브드 정도 선택">
            <div class="radio">
              <input type="radio" id="curve-strong" name="curve" value="strong">
              <label for="curve-strong">강한 커브</label>
            </div>
            <div class="radio">
              <input type="radio" id="curve-light" name="curve" value="light">
              <label for="curve-light">약한 커브·평면</label>
            </div>
          </div>
          <p class="hint">커브드 모니터는 위에서 봤을 때 화면이 곡선 형태인 모니터를 말합니다.</p>
          <p id="curve-hint" class="hint dynamic" aria-live="polite"></p>
        </fieldset>

        <fieldset>
          <legend>3. 가성비 픽, 프리미엄 픽 중에 무엇을 원하시나요?</legend>
          <div class="options two" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="tier-value" name="tier" value="value">
              <label for="tier-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium">
              <label for="tier-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="tier-hint" class="hint dynamic" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      game_strong_value: "https://link.coupang.com/a/epbdu52BPg",
      game_strong_premium: "https://link.coupang.com/a/epbrfAQA2u",
      game_light_value: "https://link.coupang.com/a/epdJWMknsG",
      game_light_premium: "https://link.coupang.com/a/epbGRtJQm4",
      work_strong_value: "https://link.coupang.com/a/epbO0wwWkK",
      work_strong_premium: "https://link.coupang.com/a/epd4RAT1lQ",
      work_light_value: "https://link.coupang.com/a/epef7EtJ24",
      work_light_premium: "https://link.coupang.com/a/epeuhG4eBg"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const curveHint = document.getElementById('curve-hint');
    const tierHint = document.getElementById('tier-hint');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const purpose = getValue('purpose');
      const curve = getValue('curve');
      const tier = getValue('tier');

      if(!purpose) return { error: '모니터의 주 사용 용도를 선택해 주세요.' };
      if(!curve) return { error: '커브드 정도를 선택해 주세요.' };
      if(!tier) return { error: '가성비 픽 또는 프리미엄 픽을 선택해 주세요.' };

      const purposeGroup = purpose === 'work' ? 'work' : 'game';
      const key = `${purposeGroup}_${curve}_${tier}`;
      const link = LINKS[key];

      return link || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateHints(){
      const curve = getValue('curve');
      const tier = getValue('tier');

      if(curve === 'strong'){
        curveHint.textContent = '강한 커브는 몰입감이 높으나, 내구성이 비교적 낮을 수 있다는 단점이 있습니다.';
      } else if(curve === 'light'){
        curveHint.textContent = '약한 커브·평면은 내구성이 비교적 높으나, 강한 커브보다 몰입감이 덜할 수 있습니다.';
      } else {
        curveHint.textContent = '';
      }

      if(tier === 'value'){
        tierHint.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.';
      } else if(tier === 'premium'){
        tierHint.textContent = '‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
      } else {
        tierHint.textContent = '';
      }
    }

    function updateButtonState(){
      updateHints();
      const ready = !!(getValue('purpose') && getValue('curve') && getValue('tier'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
