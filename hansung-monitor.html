<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한성 모니터 추천가이드</title>
  <meta name="description" content="원하는 모니터 사이즈와 용도에 맞는 한성 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: clamp(18px, 5vw, 32px) 16px 12px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(23px, 6vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.025em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(760px, 92vw);
      margin: 0 auto 20px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(16px, 4vw, 26px);
    }

    form { margin: 0; }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 18px;
    }

    fieldset:last-of-type { margin-bottom: 14px; }

    legend {
      padding: 0;
      margin-bottom: 10px;
      font-size: clamp(15px, 3.8vw, 17px);
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
    }

    .options.purpose {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .radio { position: relative; }

    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      padding: 10px 10px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }

    .radio input:focus-visible + label {
      outline: 0;
      box-shadow: 0 0 0 4px var(--ring);
    }

    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    .msg {
      min-height: 18px;
      flex: 1;
      color: #a40000;
      font-size: 13px;
      line-height: 1.3;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      background: var(--primary);
      color: var(--primary-contrast);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    footer {
      text-align: center;
      padding: 6px 16px 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.86);
    }

    @media (max-width: 680px) {
      .container {
        width: min(94vw, 520px);
        margin-bottom: 14px;
        border-radius: 14px;
      }

      fieldset { margin-bottom: 15px; }

      .options,
      .options.purpose {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .radio label {
        min-height: 44px;
        padding: 9px 8px;
        font-size: 14px;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .msg { text-align: center; }
      button.primary { width: 100%; }
    }

    @media (max-width: 360px) {
      header { padding-top: 16px; }
      .container { padding: 14px; }
      .radio label { font-size: 13.5px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>한성 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24" />
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27" />
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32" />
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options purpose" role="radiogroup" aria-label="모니터 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-office" name="purpose" value="office" />
              <label for="purpose-office">사무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-gaming" name="purpose" value="gaming" />
              <label for="purpose-gaming">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-video" name="purpose" value="video" />
              <label for="purpose-video">영상시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-multi" name="purpose" value="multi" />
              <label for="purpose-multi">다목적</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>항목을 선택하면 추천 링크로 이동합니다.</footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      SIZE_32: "https://link.coupang.com/a/eDB7py",
      SIZE_24: "https://link.coupang.com/a/eDCffe",
      SIZE_27_GAMING_MULTI: "https://link.coupang.com/a/eDBsj5",
      SIZE_27_OFFICE_VIDEO: "https://link.coupang.com/a/eDBAid"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink() {
      const size = getValue('size');
      const purpose = getValue('purpose');

      if (!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if (!purpose) return { error: '모니터 용도를 선택해 주세요.' };

      if (size === '32') return LINKS.SIZE_32;
      if (size === '24') return LINKS.SIZE_24;

      if (size === '27') {
        if (purpose === 'gaming' || purpose === 'multi') return LINKS.SIZE_27_GAMING_MULTI;
        if (purpose === 'office' || purpose === 'video') return LINKS.SIZE_27_OFFICE_VIDEO;
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateButtonState() {
      const size = getValue('size');
      const purpose = getValue('purpose');
      const ready = !!(size && purpose);

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function() {
      const result = resolveLink();

      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
