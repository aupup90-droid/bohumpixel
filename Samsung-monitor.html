<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>삼성 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 삼성 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 22px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      padding: 12px 14px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .conditional {
      display: none;
    }
    .conditional.show {
      display: block;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer {
      text-align: center;
      padding: 12px 16px 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 760px) {
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>삼성 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 원하시는 해상도는 어떻게 되나요?</legend>
          <div class="options" role="radiogroup" aria-label="해상도 선택">
            <div class="radio">
              <input type="radio" id="res-fhd" name="resolution" value="fhd">
              <label for="res-fhd">FHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-qhd" name="resolution" value="qhd">
              <label for="res-qhd">QHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-uhd" name="resolution" value="uhd">
              <label for="res-uhd">UHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-unknown" name="resolution" value="unknown">
              <label for="res-unknown">모르겠음</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 주 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-office" name="purpose" value="office">
              <label for="purpose-office">사무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-gaming" name="purpose" value="gaming">
              <label for="purpose-gaming">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-dual" name="purpose" value="dual">
              <label for="purpose-dual">듀얼 모니터</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-multi" name="purpose" value="multi">
              <label for="purpose-multi">다목적</label>
            </div>
          </div>
        </fieldset>

        <fieldset id="game-field" class="conditional" aria-hidden="true">
          <legend>4. 주로 어떤 게임을 하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="게임 종류 선택">
            <div class="radio">
              <input type="radio" id="game-online" name="game" value="online">
              <label for="game-online">경쟁적인 온라인게임</label>
            </div>
            <div class="radio">
              <input type="radio" id="game-console" name="game" value="console">
              <label for="game-console">고사양 콘솔게임</label>
            </div>
            <div class="radio">
              <input type="radio" id="game-all" name="game" value="all">
              <label for="game-all">전부</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>선택한 조건에 맞는 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      MON24_OFFICE: "https://link.coupang.com/a/eoBeQF",
      MON24_GAME: "https://link.coupang.com/a/cSLz8n",
      MON24_HIGHRES: "https://link.coupang.com/a/cSLxIm",
      MON27_FHD_OFFICE: "https://link.coupang.com/a/eoBC21",
      MON27_FHD_GAME: "https://link.coupang.com/a/cSLEP8",
      MON27_QHD_GENERAL: "https://link.coupang.com/a/eozgze",
      MON27_QHD_FAST: "https://link.coupang.com/a/eoy0B7",
      MON27_UHD_OFFICE: "https://link.coupang.com/a/cSLM6J",
      MON27_UHD_GAME: "https://link.coupang.com/a/eoB3Tb",
      MON32_STD: "https://link.coupang.com/a/eoy6MK",
      MON32_UHD_OFFICE: "https://link.coupang.com/a/eoCeVf",
      MON32_UHD_GAME: "https://link.coupang.com/a/eozzRN"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const gameField = document.getElementById('game-field');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function clearGameSelection() {
      form.querySelectorAll('input[name="game"]').forEach((input) => {
        input.checked = false;
      });
    }

    function syncGameQuestion() {
      const purpose = getValue('purpose');
      const show = purpose === 'gaming';
      gameField.classList.toggle('show', show);
      gameField.setAttribute('aria-hidden', show ? 'false' : 'true');
      if (!show) clearGameSelection();
    }

    function isReady() {
      const size = getValue('size');
      const resolution = getValue('resolution');
      const purpose = getValue('purpose');
      const game = getValue('game');

      if (!size || !resolution || !purpose) return false;
      if (purpose === 'gaming' && !game) return false;
      return true;
    }

    function resolveLink() {
      const size = getValue('size');
      const resolution = getValue('resolution');
      const purpose = getValue('purpose');
      const game = getValue('game');

      if (!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if (!resolution) return { error: '해상도를 선택해 주세요.' };
      if (!purpose) return { error: '주 용도를 선택해 주세요.' };
      if (purpose === 'gaming' && !game) return { error: '게임 종류를 선택해 주세요.' };

      if (size === '24') {
        if (resolution === 'qhd' || resolution === 'uhd') {
          return LINKS.MON24_HIGHRES;
        }
        if (resolution === 'fhd' || resolution === 'unknown') {
          if (purpose === 'office' || purpose === 'dual') return LINKS.MON24_OFFICE;
          if (purpose === 'gaming' || purpose === 'multi') return LINKS.MON24_GAME;
        }
      }

      if (size === '27') {
        if (resolution === 'fhd') {
          if (purpose === 'office' || purpose === 'dual') return LINKS.MON27_FHD_OFFICE;
          if (purpose === 'gaming' || purpose === 'multi') return LINKS.MON27_FHD_GAME;
        }

        if (resolution === 'qhd' || resolution === 'unknown') {
          if (purpose === 'office' || purpose === 'dual' || purpose === 'multi') {
            return LINKS.MON27_QHD_GENERAL;
          }
          if (purpose === 'gaming') {
            if (game === 'console') return LINKS.MON27_QHD_GENERAL;
            if (game === 'online' || game === 'all') return LINKS.MON27_QHD_FAST;
          }
        }

        if (resolution === 'uhd') {
          if (purpose === 'office' || purpose === 'dual') return LINKS.MON27_UHD_OFFICE;
          if (purpose === 'gaming' || purpose === 'multi') return LINKS.MON27_UHD_GAME;
        }
      }

      if (size === '32') {
        if (resolution === 'fhd' || resolution === 'qhd' || resolution === 'unknown') {
          return LINKS.MON32_STD;
        }
        if (resolution === 'uhd') {
          if (purpose === 'office' || purpose === 'dual') return LINKS.MON32_UHD_OFFICE;
          if (purpose === 'gaming' || purpose === 'multi') return LINKS.MON32_UHD_GAME;
        }
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateButtonState() {
      syncGameQuestion();
      const ready = isReady();
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', () => {
      const result = resolveLink();
      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
