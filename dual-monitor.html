<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서브 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 선택한 조건에 맞는 서브 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      align-content: center;
      padding: 22px 0;
    }

    header {
      padding: 0 20px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(760px, 92vw);
      margin: 0 auto;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 26px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 18px;
    }

    fieldset:last-of-type { margin-bottom: 10px; }

    legend {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .options.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .radio { position: relative; }
    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      line-height: 1.2;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label {
      outline: 0;
      box-shadow: 0 0 0 4px var(--ring);
    }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .notice {
      min-height: 18px;
      margin: 4px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .msg {
      flex: 1;
      min-height: 18px;
      font-size: 13px;
      color: #a40000;
      line-height: 1.4;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
      white-space: nowrap;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    @media (max-width: 520px) {
      .wrap { align-content: start; padding: 18px 0; }
      header { padding-bottom: 12px; }
      .container { width: min(94vw, 760px); padding: 16px; }
      fieldset { margin-bottom: 16px; }
      legend { font-size: 15px; margin-bottom: 8px; }
      .options { gap: 8px; }
      .radio label { min-height: 42px; padding: 9px 8px; font-size: 14px; border-radius: 11px; }
      .notice { margin-bottom: 10px; font-size: 11.5px; }
      .actions { display: block; }
      .msg { margin-bottom: 8px; text-align: center; }
      button.primary { width: 100%; padding: 13px 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>서브 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 최종적으로 결정한 서브 모니터의 크기는 어떻게 되나요?</legend>
          <div class="options" role="radiogroup" aria-label="서브 모니터 크기 선택">
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-15-6" name="size" value="15.6">
              <label for="size-15-6">15.6인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 가성비 픽과 프리미엄 픽 중에 무엇을 선택 하실건가요?</legend>
          <div class="options two" role="radiogroup" aria-label="추천 픽 선택">
            <div class="radio">
              <input type="radio" id="tier-value" name="tier" value="value">
              <label for="tier-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium">
              <label for="tier-premium">프리미엄 픽</label>
            </div>
          </div>
        </fieldset>

        <p id="notice" class="notice" aria-live="polite"></p>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      "27": {
        value: "https://link.coupang.com/a/dNJSkAHc2m",
        premium: "https://link.coupang.com/a/dOw6GZKJS8"
      },
      "24": {
        value: "https://link.coupang.com/a/dOxgKhwFfo",
        premium: "https://link.coupang.com/a/dNJHE5nm4y"
      },
      "15.6": {
        value: "https://link.coupang.com/a/dNJ0A3Js2m",
        premium: "https://link.coupang.com/a/dGGG3AT3Gm"
      }
    };

    const NOTICES = {
      value: "‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.",
      premium: "‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다."
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const noticeEl = document.getElementById('notice');
    const goBtn = document.getElementById('go');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const size = getValue('size');
      const tier = getValue('tier');

      if(!size) return { error: '서브 모니터 크기를 선택해 주세요.' };
      if(!tier) return { error: '추천 픽을 선택해 주세요.' };

      const link = LINKS[size] && LINKS[size][tier];
      return link || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateState(){
      const size = getValue('size');
      const tier = getValue('tier');

      noticeEl.textContent = tier ? NOTICES[tier] : '';
      goBtn.disabled = !(size && tier);
      msgEl.textContent = size && tier ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateState);
    updateState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
