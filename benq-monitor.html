<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>벤큐 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 게이밍 장르와 선택 기준에 맞는 벤큐 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 18px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 36px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(840px, 92vw);
      margin: 0 auto 28px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 20px; }
    legend { font-weight: 800; margin-bottom: 12px; font-size: 16px; line-height: 1.35; }

    .options {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .options.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .pick-note {
      min-height: 18px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer {
      text-align: center;
      padding: 10px 16px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 720px) {
      header { padding-top: 24px; }
      .container { margin-bottom: 22px; }
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .radio label { min-height: 46px; padding: 10px 9px; font-size: 14px; }
      fieldset { margin-bottom: 18px; }
    }

    @media (max-width: 360px) {
      .container { width: 94vw; padding: 16px; }
      .radio label { font-size: 13px; }
      button.primary { width: 100%; }
      .actions { justify-content: stretch; }
      .msg { width: 100%; text-align: right; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>벤큐 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 주로 하시는 게이밍의 장르는 무엇인가요?</legend>
          <div class="options" role="radiogroup" aria-label="게이밍 장르 선택">
            <div class="radio">
              <input type="radio" id="genre-fps" name="genre" value="fps">
              <label for="genre-fps">FPS</label>
            </div>
            <div class="radio">
              <input type="radio" id="genre-aos" name="genre" value="aos">
              <label for="genre-aos">AOS</label>
            </div>
            <div class="radio">
              <input type="radio" id="genre-console" name="genre" value="console">
              <label for="genre-console">콘솔게임</label>
            </div>
            <div class="radio">
              <input type="radio" id="genre-none" name="genre" value="none">
              <label for="genre-none">게임을 하지 않음</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 가성비 픽과 프리미엄 픽 중에 무엇을 선택 하실건가요?</legend>
          <div class="options two" role="radiogroup" aria-label="추천 기준 선택">
            <div class="radio">
              <input type="radio" id="pick-value" name="pick" value="value">
              <label for="pick-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="pick-note" class="pick-note" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      FPS_VALUE: "https://link.coupang.com/a/dTPYqSu0Hs",
      FPS_PREMIUM: "https://link.coupang.com/a/dTOM5ALFxA",
      AOS_CONSOLE_VALUE: "https://link.coupang.com/a/dTQq6OFrVs",
      AOS_CONSOLE_PREMIUM: "https://link.coupang.com/a/dTQnDCJLvo",
      NONE_VALUE: "https://link.coupang.com/a/dTQ8Dto8CO",
      NONE_PREMIUM: "https://link.coupang.com/a/dTQ4O8l90m"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const pickNote = document.getElementById('pick-note');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const genre = getValue('genre');
      const pick = getValue('pick');

      if(!genre) return { error: '게이밍 장르를 선택해 주세요.' };
      if(!pick) return { error: '추천 기준을 선택해 주세요.' };

      if(genre === 'fps' && pick === 'value') return LINKS.FPS_VALUE;
      if(genre === 'fps' && pick === 'premium') return LINKS.FPS_PREMIUM;

      if((genre === 'aos' || genre === 'console') && pick === 'value') return LINKS.AOS_CONSOLE_VALUE;
      if((genre === 'aos' || genre === 'console') && pick === 'premium') return LINKS.AOS_CONSOLE_PREMIUM;

      if(genre === 'none' && pick === 'value') return LINKS.NONE_VALUE;
      if(genre === 'none' && pick === 'premium') return LINKS.NONE_PREMIUM;

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updatePickNote(){
      const pick = getValue('pick');
      if(pick === 'value') {
        pickNote.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 성능이 떨어질 수 있습니다.';
      } else if(pick === 'premium') {
        pickNote.textContent = '‘프리미엄 픽’은 성능에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
      } else {
        pickNote.textContent = '';
      }
    }

    function updateButtonState(){
      const genre = getValue('genre');
      const pick = getValue('pick');
      const ready = !!(genre && pick);

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updatePickNote();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
