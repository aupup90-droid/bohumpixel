<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>24インチモニターおすすめガイド</title>
  <meta
    name="description"
    content="質問に答えると、ご希望に合った24インチモニターのおすすめページへ移動します。"
  />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        system-ui,
        -apple-system,
        "Segoe UI",
        Roboto,
        "Noto Sans JP",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        Meiryo,
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: clamp(20px, 5vw, 32px) 16px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(21px, 5vw, 36px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow:
        0 1px 0 rgba(0, 0, 0, 0.1),
        0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 28px;
      padding: clamp(16px, 3vw, 28px);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    fieldset {
      margin: 0 0 18px;
      padding: 0;
      border: 0;
    }

    legend {
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .options.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .radio {
      position: relative;
    }

    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      line-height: 1.3;
      cursor: pointer;
      user-select: none;
      transition:
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        transform 0.02s ease;
    }

    .radio label:hover {
      border-color: #d6d6db;
    }

    .radio input:focus-visible + label {
      outline: 0;
      box-shadow: 0 0 0 4px var(--ring);
    }

    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74, 42, 116, 0.18);
      transform: translateY(-1px);
    }

    .hint {
      min-height: 18px;
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .hint:empty {
      display: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    button.primary {
      appearance: none;
      padding: 14px 18px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: var(--primary-contrast);
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74, 42, 116, 0.25);
      transition:
        transform 0.06s ease,
        box-shadow 0.2s ease,
        opacity 0.2s ease;
    }

    button.primary:hover {
      box-shadow: 0 16px 32px rgba(74, 42, 116, 0.32);
    }

    button.primary:active {
      transform: translateY(1px);
    }

    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .msg {
      color: #a40000;
      font-size: 13px;
    }

    footer {
      padding: 8px 16px 22px;
      color: rgba(255, 255, 255, 0.85);
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 640px) {
      header {
        padding-top: 18px;
        padding-bottom: 10px;
      }

      header h1 {
        font-size: clamp(20px, 6vw, 26px);
      }

      .container {
        width: min(94vw, 520px);
        margin-bottom: 16px;
        padding: 14px;
        border-radius: 14px;
      }

      fieldset {
        margin-bottom: 14px;
      }

      legend {
        margin-bottom: 7px;
        font-size: 14px;
        line-height: 1.35;
      }

      .options {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .options.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .radio label {
        min-height: 42px;
        padding: 8px 5px;
        border-radius: 10px;
        font-size: 12.5px;
        line-height: 1.25;
      }

      .hint {
        margin-top: 5px;
        font-size: 11.5px;
        line-height: 1.4;
      }

      .actions {
        margin-top: 7px;
      }

      .msg {
        width: 100%;
        font-size: 12px;
        text-align: right;
      }

      button.primary {
        width: 100%;
        padding: 12px 16px;
      }

      footer {
        padding-bottom: 14px;
      }
    }

    @media (max-width: 360px) {
      .radio label {
        padding-right: 4px;
        padding-left: 4px;
        font-size: 11.5px;
      }
    }
  </style>
<script type="text/javascript" nonce="f71c95c8503f4127a55ac56235c" src="//local.adguard.org?ts=1784891460254&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_00000000375481f58cbc6a029e348563%26fn%3D24inch-monitor-guide-ja.html%26cd%3Dattachment%26ts%3D495804%26p%3Dfs%26cid%3D1%26sig%3Dcc1d1da17d98475c29bb83bf84cc47c8b3cd2d592dd6c5a542bdbfad8b43310e%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="f71c95c8503f4127a55ac56235c" src="//local.adguard.org?ts=1784891460254&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>24インチモニターおすすめガイド</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. ご希望の解像度はどれですか？</legend>
          <div class="options" role="radiogroup" aria-label="解像度を選択">
            <div class="radio">
              <input type="radio" id="res-fhd" name="resolution" value="fhd" />
              <label for="res-fhd">フルHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-wqhd" name="resolution" value="wqhd" />
              <label for="res-wqhd">WQHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-unknown" name="resolution" value="unknown" />
              <label for="res-unknown">わからない</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. モニターの主な用途は何ですか？</legend>
          <div class="options" role="radiogroup" aria-label="主な用途を選択">
            <div class="radio">
              <input type="radio" id="pur-game" name="purpose" value="game" />
              <label for="pur-game">ゲーミング</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-work" name="purpose" value="work" />
              <label for="pur-work">仕事・Web閲覧</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-all" name="purpose" value="all" />
              <label for="pur-all">すべて</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. コスパ重視セレクトとプレミアセレクトのどちらをご希望ですか？</legend>
          <div class="options two" role="radiogroup" aria-label="セレクトの種類を選択">
            <div class="radio">
              <input type="radio" id="tier-value" name="tier" value="value" />
              <label for="tier-value">コスパ重視セレクト</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium" />
              <label for="tier-premium">プレミアセレクト</label>
            </div>
          </div>
          <p id="tier-hint" class="hint" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="おすすめを見る">
            おすすめを見る
          </button>
        </div>
      </form>
    </main>

    <footer>
      <span>すべての項目を選択すると、おすすめページへ移動します。</span>
    </footer>
  </div>

  <noscript>
    このガイドを利用するにはJavaScriptが必要です。ブラウザの設定でJavaScriptを有効にしてください。
  </noscript>

  <script>
    const LINKS = {
      FHD_GAME_VALUE: "https://amzn.to/4wYNIuA",
      FHD_GAME_PREMIUM: "https://amzn.to/3R8fBkU",
      FHD_WORK_VALUE: "https://amzn.to/45mqWB2",
      FHD_WORK_PREMIUM: "https://amzn.to/3Ru96cc",
      WQHD_GAME_VALUE: "https://amzn.to/4wrPNQ8",
      WQHD_GAME_PREMIUM: "https://amzn.to/4wrPNQ8",
      WQHD_WORK_VALUE: "https://amzn.to/4fw7VAK",
      WQHD_WORK_PREMIUM: "https://amzn.to/4fyf3wy"
    };

    const form = document.getElementById("guide-form");
    const msgEl = document.getElementById("msg");
    const goBtn = document.getElementById("go");
    const tierHint = document.getElementById("tier-hint");

    function getValue(name) {
      const element = form.querySelector(`input[name="${name}"]:checked`);
      return element ? element.value : null;
    }

    function updateTierHint() {
      const tier = getValue("tier");

      if (tier === "value") {
        tierHint.textContent =
          "「コスパ重視セレクト」は価格を重視した選択肢のため、品質や安定性の面で一部劣る場合があります。";
      } else if (tier === "premium") {
        tierHint.textContent =
          "「プレミアセレクト」は品質と安定性を重視した選択肢のため、価格帯が高くなる場合があります。";
      } else {
        tierHint.textContent = "";
      }
    }

    function resolveLink() {
      const resolution = getValue("resolution");
      const purpose = getValue("purpose");
      const tier = getValue("tier");

      if (!resolution) {
        return { error: "解像度を選択してください。" };
      }

      if (!purpose) {
        return { error: "主な用途を選択してください。" };
      }

      if (!tier) {
        return { error: "セレクトの種類を選択してください。" };
      }

      const purposeGroup = purpose === "work" ? "WORK" : "GAME";
      const tierGroup = tier === "value" ? "VALUE" : "PREMIUM";
      const resolutionGroup = resolution === "wqhd" ? "WQHD" : "FHD";
      const linkKey = `${resolutionGroup}_${purposeGroup}_${tierGroup}`;

      return LINKS[linkKey] || { error: "選択内容をもう一度確認してください。" };
    }

    function updateButtonState() {
      updateTierHint();

      const ready = Boolean(
        getValue("resolution") &&
        getValue("purpose") &&
        getValue("tier")
      );

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? "" : "必須項目を選択してください。";
    }

    form.addEventListener("change", updateButtonState);
    updateButtonState();

    goBtn.addEventListener("click", function () {
      const result = resolveLink();

      if (typeof result === "string") {
        const link = document.createElement("a");
        link.href = result;
        link.target = "_blank";
        link.rel = "noopener noreferrer nofollow sponsored";
        document.body.appendChild(link);
        link.click();
        link.remove();
        msgEl.textContent = "";
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
