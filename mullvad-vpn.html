<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>뮬바드 VPN 적합성 평가</title>
  <meta name="description" content="질문에 답하면 조건에 따라 Mullvad 또는 ExpressVPN 링크로 이동합니다." />
  <style>
    :root {
      /* dual-monitor 파일의 톤 & 컴포넌트 스타일을 그대로 사용 */
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: --bg;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 22px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    /* pill radios */
    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: block; width: 100%; padding: 12px 14px; border: 1.5px solid #e5e5e8; border-radius: 12px;
      background: #fff; color: var(--text); text-align: center; font-weight: 600; cursor: pointer; user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .hint { color: var(--muted); font-size: 13px; margin-top: 6px; }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none; border: 0; border-radius: 999px; padding: 14px 18px; font-weight: 800; letter-spacing: 0.02em;
      background: var(--primary); color: var(--primary-contrast); cursor: pointer; box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer { text-align: center; padding: 12px 16px 28px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) { .options { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>뮬바드 VPN 적합성 평가</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. VPN을 얼마나 오래 사용하실 예정인가요?</legend>
          <div class="options" role="radiogroup" aria-label="VPN 사용 기간 선택">
            <div class="radio">
              <input type="radio" id="dur-lt6" name="duration" value="lt6">
              <label for="dur-lt6">6개월 이하</label>
            </div>
            <div class="radio">
              <input type="radio" id="dur-gte6" name="duration" value="gte6">
              <label for="dur-gte6">6개월 이상</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. VPN은 항상 켜놓고 계신가요?</legend>
          <div class="options" role="radiogroup" aria-label="VPN 상시 사용 여부 선택">
            <div class="radio">
              <input type="radio" id="on-always" name="always_on" value="always">
              <label for="on-always">항상 켜놓음</label>
            </div>
            <div class="radio">
              <input type="radio" id="on-sometimes" name="always_on" value="sometimes">
              <label for="on-sometimes">가끔 켜놓음</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 주로 사용하는 VPN 서버는?</legend>
          <div class="options" role="radiogroup" aria-label="주 사용 서버 선택">
            <div class="radio">
              <input type="radio" id="sv-jp" name="server" value="jp">
              <label for="sv-jp">일본 서버</label>
            </div>
            <div class="radio">
              <input type="radio" id="sv-kr" name="server" value="kr">
              <label for="sv-kr">한국 서버</label>
            </div>
            <div class="radio">
              <input type="radio" id="sv-ot" name="server" value="other">
              <label for="sv-ot">그외</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="결과 보기">결과 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 결과 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      MULLVAD: "https://mullvad.net/ko",
      EXPRESS: "https://go.expressvpn.com/c/4450159/1645836/16063"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const duration = getValue('duration');     // lt6 | gte6
      const alwaysOn = getValue('always_on');    // always | sometimes
      const server = getValue('server');         // jp | kr | other

      if(!duration) return { error: 'VPN 사용 기간을 선택해 주세요.' };
      if(!alwaysOn) return { error: 'VPN 상시 사용 여부를 선택해 주세요.' };
      if(!server) return { error: '주로 사용하는 서버를 선택해 주세요.' };

      let score = 0;
      if(duration === 'lt6') score += 1;
      if(alwaysOn === 'always') score += 1;
      if(server === 'jp') score += 1;

      return (score >= 2) ? LINKS.MULLVAD : LINKS.EXPRESS;
    }

    function updateButtonState(){
      const duration = getValue('duration');
      const alwaysOn = getValue('always_on');
      const server = getValue('server');

      const ready = !!(duration && alwaysOn && server);
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
