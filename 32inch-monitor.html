<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>32인치 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 32인치 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      /* 기존 가이드와 동일한 톤 & 컴포넌트 스타일 */
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 30px 20px 14px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 30px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(17px, 3vw, 26px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 20px; }
    legend { font-weight: 700; margin-bottom: 11px; font-size: 16px; line-height: 1.35; }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .hint {
      display: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
      word-break: keep-all;
    }
    .hint.show { display: block; }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer { text-align: center; padding: 10px 16px 24px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      header { padding: 22px 16px 12px; }
      .container { width: min(440px, 92vw); margin-bottom: 22px; padding: 16px; border-radius: 14px; }
      fieldset { margin-bottom: 16px; }
      legend { margin-bottom: 9px; font-size: 15px; }
      .options { gap: 8px; }
      .radio label { min-height: 42px; padding: 9px 8px; border-radius: 11px; font-size: 14px; }
      .hint { font-size: 12px; margin-top: 7px; }
      .actions { margin-top: 12px; display: grid; grid-template-columns: 1fr; gap: 8px; }
      .msg { min-height: 18px; text-align: center; }
      button.primary { width: 100%; padding: 13px 16px; }
      footer { padding-bottom: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>32인치 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 원하시는 해상도는 무엇인가요?</legend>
          <div class="options" role="radiogroup" aria-label="해상도 선택">
            <div class="radio">
              <input type="radio" id="res-fhd" name="resolution" value="fhd">
              <label for="res-fhd">FHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-qhd" name="resolution" value="qhd">
              <label for="res-qhd">QHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-4k" name="resolution" value="4k">
              <label for="res-4k">4K</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 모니터의 주 사용 용도는 무엇인가요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 주 사용 용도 선택">
            <div class="radio">
              <input type="radio" id="pur-game" name="purpose" value="game">
              <label for="pur-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-work" name="purpose" value="work">
              <label for="pur-work">업무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-all" name="purpose" value="all">
              <label for="pur-all">전부</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 가성비 픽, 프리미엄 픽 중에 무엇을 원하시나요?</legend>
          <div class="options two-options" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="tier-value" name="tier" value="value">
              <label for="tier-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium">
              <label for="tier-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="tier-hint" class="hint" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    // 링크 맵 (요청 사양)
    const LINKS = {
      FHD_GAME_ALL: "https://link.coupang.com/a/ek1tdnXjBQ",
      FHD_WORK: "https://link.coupang.com/a/ek18ojXPgG",
      QHD_GAME_ALL_VALUE: "https://link.coupang.com/a/ekVv1xsDcq",
      QHD_GAME_ALL_PREMIUM: "https://link.coupang.com/a/ekWiQNJgt2",
      QHD_WORK_VALUE: "https://link.coupang.com/a/ekWJ6qad7Q",
      QHD_WORK_PREMIUM: "https://link.coupang.com/a/ekXLF5ZyOy",
      UHD_GAME_ALL_VALUE: "https://link.coupang.com/a/ekXXVi5mzQ",
      UHD_GAME_ALL_PREMIUM: "https://link.coupang.com/a/ekYjkBk9lc",
      UHD_WORK_VALUE: "https://link.coupang.com/a/ekYzGzcScu",
      UHD_WORK_PREMIUM: "https://link.coupang.com/a/ekYS9WwYZU"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const tierHint = document.getElementById('tier-hint');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const resolution = getValue('resolution');
      const purpose = getValue('purpose');
      const tier = getValue('tier');

      if(!resolution) return { error: '해상도를 선택해 주세요.' };
      if(!purpose) return { error: '주 사용 용도를 선택해 주세요.' };
      if(!tier) return { error: '추천 유형을 선택해 주세요.' };

      if(resolution === 'fhd'){
        if(purpose === 'work') return LINKS.FHD_WORK;
        return LINKS.FHD_GAME_ALL;
      }

      if(resolution === 'qhd'){
        if(purpose === 'work'){
          return tier === 'value' ? LINKS.QHD_WORK_VALUE : LINKS.QHD_WORK_PREMIUM;
        }
        return tier === 'value' ? LINKS.QHD_GAME_ALL_VALUE : LINKS.QHD_GAME_ALL_PREMIUM;
      }

      if(resolution === '4k'){
        if(purpose === 'work'){
          return tier === 'value' ? LINKS.UHD_WORK_VALUE : LINKS.UHD_WORK_PREMIUM;
        }
        return tier === 'value' ? LINKS.UHD_GAME_ALL_VALUE : LINKS.UHD_GAME_ALL_PREMIUM;
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateTierHint(){
      const tier = getValue('tier');
      if(tier === 'value'){
        tierHint.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.';
        tierHint.classList.add('show');
      } else if(tier === 'premium'){
        tierHint.textContent = '‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
        tierHint.classList.add('show');
      } else {
        tierHint.textContent = '';
        tierHint.classList.remove('show');
      }
    }

    function updateButtonState(){
      const ready = !!(getValue('resolution') && getValue('purpose') && getValue('tier'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updateTierHint();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
