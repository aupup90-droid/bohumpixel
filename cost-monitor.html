<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>가성비 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 조건에 맞는 가성비 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
      --danger: #a40000;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 22px 0;
    }

    header {
      padding: 10px 20px 16px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 38px);
      line-height: 1.15;
      font-weight: 850;
      letter-spacing: -0.04em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 28px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 18px;
    }

    legend {
      font-weight: 750;
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
    }

    .options.purpose {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .radio { position: relative; }

    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 650;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .tier-hint {
      min-height: 18px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .msg {
      color: var(--danger);
      font-size: 13px;
      line-height: 1.35;
      margin-right: auto;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      background: var(--primary);
      color: var(--primary-contrast);
      font-weight: 850;
      letter-spacing: 0.01em;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.58; cursor: not-allowed; box-shadow: none; }

    @media (max-width: 640px) {
      .wrap { justify-content: flex-start; padding: 16px 0 18px; }
      header { padding: 8px 16px 12px; }
      .container { width: min(94vw, 520px); padding: 16px; border-radius: 15px; }
      fieldset { margin-bottom: 15px; }
      legend { font-size: 15px; margin-bottom: 8px; }
      .options { gap: 7px; }
      .options.purpose { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .radio label { min-height: 40px; padding: 9px 8px; font-size: 14px; border-radius: 11px; }
      .tier-hint { font-size: 12px; margin-top: 6px; }
      .actions { margin-top: 8px; }
      .msg { width: 100%; order: 2; text-align: center; margin-right: 0; }
      button.primary { width: 100%; padding: 13px 16px; }
    }

    @media (max-width: 360px) {
      .container { padding: 14px; }
      .radio label { font-size: 13px; padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>가성비 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>어떤 티어의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 티어 선택">
            <div class="radio">
              <input type="radio" id="tier-3" name="tier" value="3">
              <label for="tier-3">3 티어</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-4" name="tier" value="4">
              <label for="tier-4">4 티어</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-5" name="tier" value="5">
              <label for="tier-5">5 티어</label>
            </div>
          </div>
          <div id="tier-hint" class="tier-hint" aria-live="polite"></div>
        </fieldset>

        <fieldset>
          <legend>어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options purpose" role="radiogroup" aria-label="모니터 주 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-game" name="purpose" value="game">
              <label for="purpose-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-office" name="purpose" value="office">
              <label for="purpose-office">사무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-video" name="purpose" value="video">
              <label for="purpose-video">영상시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-multi" name="purpose" value="multi">
              <label for="purpose-multi">다목적</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보러가기">추천 보러가기</button>
        </div>
      </form>
    </main>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      t3_24_game: "https://link.coupang.com/a/eGrSy8",
      t3_27_game: "https://link.coupang.com/a/eGrXxh",
      t3_32_game: "https://link.coupang.com/a/eGsyY8",
      t3_24_general: "https://link.coupang.com/a/eGsMpj",
      t3_27_general: "https://link.coupang.com/a/eGsRmu",
      t3_32_general: "https://link.coupang.com/a/eGsUF2",
      t4_24_game: "https://link.coupang.com/a/eGsZq1",
      t4_27_game: "https://link.coupang.com/a/eGtvXp",
      t4_24_general: "https://link.coupang.com/a/eGtK4e",
      t4_27_general: "https://link.coupang.com/a/eGtQar",
      t5_24: "https://link.coupang.com/a/eGt3ch",
      t5_27: "https://link.coupang.com/a/eGugvm",
      budget_32: "https://link.coupang.com/a/eGtBH3"
    };

    const TIER_HINTS = {
      "3": "‘3 티어’는 가격 보다 품질과 안정성에 좀 더 비중을 둔 선택지입니다.",
      "4": "‘4 티어’는 가격과 품질의 밸런스에 비중을 둔 선택지입니다.",
      "5": "‘5 티어’는 품질 보다 가격에 좀 더 비중을 둔 선택지 입니다."
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const tierHintEl = document.getElementById('tier-hint');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function purposeGroup(purpose) {
      return purpose === 'game' || purpose === 'multi' ? 'game' : 'general';
    }

    function resolveLink() {
      const tier = getValue('tier');
      const size = getValue('size');
      const purpose = getValue('purpose');

      if (!tier || !size || !purpose) return { error: '모든 항목을 선택해 주세요.' };

      if (tier === '5') {
        if (size === '24') return LINKS.t5_24;
        if (size === '27') return LINKS.t5_27;
        return LINKS.budget_32;
      }

      if (tier === '4' && size === '32') return LINKS.budget_32;

      const group = purposeGroup(purpose);
      return LINKS[`t${tier}_${size}_${group}`] || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateState() {
      const tier = getValue('tier');
      const size = getValue('size');
      const purpose = getValue('purpose');
      const ready = Boolean(tier && size && purpose);

      tierHintEl.textContent = tier ? TIER_HINTS[tier] : '';
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '모든 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateState);
    updateState();

    goBtn.addEventListener('click', function() {
      const result = resolveLink();

      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
        return;
      }

      if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
