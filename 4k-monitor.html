<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4K 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 4K 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 30px 20px 14px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(23px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }
    .container {
      width: min(860px, 92vw);
      margin: 0 auto 28px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 28px);
      align-self: start;
    }
    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 20px;
    }
    legend {
      font-weight: 700;
      margin-bottom: 11px;
      font-size: 16px;
      line-height: 1.35;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .options.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .radio { position: relative; }
    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .radio label {
      display: flex;
      width: 100%;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 650;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label {
      outline: 0;
      box-shadow: 0 0 0 4px var(--ring);
    }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }
    .hint {
      display: none;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      margin: 8px 2px 0;
    }
    .hint.show { display: block; }
    .actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }
    .msg {
      min-height: 18px;
      font-size: 13px;
      color: #a40000;
    }
    @media (max-width: 720px) {
      .options.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      .wrap { min-height: auto; }
      header { padding: 22px 14px 10px; }
      header h1 { font-size: 24px; }
      .container {
        width: min(94vw, 520px);
        margin-bottom: 18px;
        border-radius: 14px;
        padding: 16px;
      }
      fieldset { margin-bottom: 16px; }
      legend {
        margin-bottom: 9px;
        font-size: 15px;
      }
      .options { gap: 8px; }
      .radio label {
        min-height: 43px;
        padding: 9px 8px;
        border-radius: 11px;
        font-size: 14px;
      }
      .hint {
        font-size: 12px;
        margin-top: 7px;
      }
      .actions {
        margin-top: 6px;
        justify-content: stretch;
      }
      .msg { width: 100%; }
      button.primary {
        width: 100%;
        padding: 13px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>4K 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options four" role="radiogroup" aria-label="모니터 주 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-game" name="purpose" value="game">
              <label for="purpose-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-work" name="purpose" value="work">
              <label for="purpose-work">업무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-video" name="purpose" value="video">
              <label for="purpose-video">영상 시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-all" name="purpose" value="all">
              <label for="purpose-all">전부</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 가성비 픽, 프리미엄 픽 중에 무엇을 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="tier-budget" name="tier" value="budget">
              <label for="tier-budget">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium">
              <label for="tier-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="tier-hint" class="hint" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      "27_game_budget": "https://link.coupang.com/a/eALFOd3ZsG",
      "27_game_premium": "https://link.coupang.com/a/fvqe43EG5Y",
      "32_game_budget": "https://link.coupang.com/a/eBzrg65evc",
      "32_game_premium": "https://link.coupang.com/a/fvqoEQ98JE",
      "27_general_budget": "https://link.coupang.com/a/fvqin3w7yK",
      "27_general_premium": "https://link.coupang.com/a/eBy4DhAFoG",
      "32_general_budget": "https://link.coupang.com/a/eBzFB9S05s",
      "32_general_premium": "https://link.coupang.com/a/fvqtkrxQ3U"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const tierHint = document.getElementById('tier-hint');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const size = getValue('size');
      const purpose = getValue('purpose');
      const tier = getValue('tier');

      if(!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if(!purpose) return { error: '모니터의 주 용도를 선택해 주세요.' };
      if(!tier) return { error: '추천 유형을 선택해 주세요.' };

      const purposeGroup = (purpose === 'game' || purpose === 'all') ? 'game' : 'general';
      const key = `${size}_${purposeGroup}_${tier}`;
      const link = LINKS[key];

      return link || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateTierHint(){
      const tier = getValue('tier');

      if(tier === 'budget'){
        tierHint.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.';
        tierHint.classList.add('show');
        return;
      }

      if(tier === 'premium'){
        tierHint.textContent = '‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
        tierHint.classList.add('show');
        return;
      }

      tierHint.textContent = '';
      tierHint.classList.remove('show');
    }

    function updateButtonState(){
      const ready = !!(getValue('size') && getValue('purpose') && getValue('tier'));
      goBtn.disabled = !ready;
      msgEl.textContent = '';
      updateTierHint();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();

      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
        return;
      }

      if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
