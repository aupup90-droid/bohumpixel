<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>세로 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 세로 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
      --disabled: #f2f2f4;
      --disabled-text: #9a9aa0;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 20px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(23px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(860px, 92vw);
      margin: 0 auto 28px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(17px, 3vw, 26px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 20px;
    }

    legend {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .radio { position: relative; }

    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease, background .2s ease, color .2s ease;
      word-break: keep-all;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    fieldset.disabled legend { color: var(--disabled-text); }
    fieldset.disabled .radio label {
      background: var(--disabled);
      color: var(--disabled-text);
      border-color: #e2e2e6;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    .hints {
      min-height: 38px;
      margin-top: 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 5px;
      word-break: keep-all;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 19px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg {
      min-height: 18px;
      font-size: 13px;
      color: #a40000;
      margin-right: auto;
    }

    footer {
      text-align: center;
      padding: 10px 16px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 640px) {
      .wrap { min-height: 100dvh; }

      header { padding: 22px 16px 11px; }
      header h1 { font-size: 24px; }

      .container {
        width: min(94vw, 520px);
        margin-bottom: 20px;
        padding: 16px;
        border-radius: 15px;
      }

      fieldset { margin-bottom: 15px; }
      legend { font-size: 14px; margin-bottom: 8px; }

      .options { gap: 8px; }

      .radio label {
        min-height: 41px;
        padding: 9px 9px;
        border-radius: 11px;
        font-size: 14px;
      }

      .hints {
        min-height: 32px;
        margin-top: 2px;
      }

      .hint {
        font-size: 12px;
        line-height: 1.38;
        margin-top: 4px;
      }

      .actions {
        margin-top: 8px;
        justify-content: stretch;
      }

      .msg {
        width: 100%;
        min-height: 16px;
        font-size: 12px;
      }

      button.primary {
        width: 100%;
        padding: 13px 16px;
      }

      footer { padding-bottom: 18px; }
    }

    @media (max-width: 360px) {
      .container { padding: 14px; }
      .radio label { font-size: 13px; padding-inline: 7px; }
      legend { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>세로 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 모니터암 방식과 피벗 모니터 방식 중 무엇을 선택하실 건가요?</legend>
          <div class="options" role="radiogroup" aria-label="사용 방식 선택">
            <div class="radio">
              <input type="radio" id="method-arm" name="method" value="arm">
              <label for="method-arm">모니터암 방식</label>
            </div>
            <div class="radio">
              <input type="radio" id="method-pivot" name="method" value="pivot">
              <label for="method-pivot">피벗 모니터 방식</label>
            </div>
          </div>
        </fieldset>

        <fieldset id="type-fieldset">
          <legend>2. 24인치 모니터와 포터블 모니터 중 무엇을 선택하실 건가요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 유형 선택">
            <div class="radio">
              <input type="radio" id="type-24" name="monitorType" value="24">
              <label for="type-24">24인치 모니터</label>
            </div>
            <div class="radio">
              <input type="radio" id="type-portable" name="monitorType" value="portable">
              <label for="type-portable">포터블 모니터</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 가성비 픽과 프리미엄 픽 중 무엇을 선택하실 건가요?</legend>
          <div class="options" role="radiogroup" aria-label="추천 등급 선택">
            <div class="radio">
              <input type="radio" id="tier-value" name="tier" value="value">
              <label for="tier-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium">
              <label for="tier-premium">프리미엄 픽</label>
            </div>
          </div>
        </fieldset>

        <div id="hints" class="hints" aria-live="polite"></div>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>필수 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      ARM_24_VALUE: "https://link.coupang.com/a/dLe8lLeySO",
      ARM_24_PREMIUM: "https://link.coupang.com/a/dLfoU5PL1o",
      ARM_PORTABLE_VALUE: "https://link.coupang.com/a/dLghPNcl5g",
      ARM_PORTABLE_PREMIUM: "https://link.coupang.com/a/dLgxED6ZzM",
      PIVOT_VALUE: "https://link.coupang.com/a/dLgTHW05o4",
      PIVOT_PREMIUM: "https://link.coupang.com/a/dLg3JNAFwW"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const hintsEl = document.getElementById('hints');
    const typeFieldset = document.getElementById('type-fieldset');
    const typeInputs = Array.from(form.querySelectorAll('input[name="monitorType"]'));

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function setTypeDisabled(disabled) {
      typeFieldset.classList.toggle('disabled', disabled);
      typeInputs.forEach((input) => {
        input.disabled = disabled;
        if (disabled) input.checked = false;
      });
    }

    function resolveLink() {
      const method = getValue('method');
      const monitorType = getValue('monitorType');
      const tier = getValue('tier');

      if (!method) return { error: '사용 방식을 선택해 주세요.' };
      if (!tier && method === 'pivot') return { error: '추천 등급을 선택해 주세요.' };

      if (method === 'pivot') {
        if (tier === 'value') return LINKS.PIVOT_VALUE;
        if (tier === 'premium') return LINKS.PIVOT_PREMIUM;
      }

      if (method === 'arm') {
        if (!monitorType) return { error: '모니터 유형을 선택해 주세요.' };
        if (!tier) return { error: '추천 등급을 선택해 주세요.' };

        if (monitorType === '24' && tier === 'value') return LINKS.ARM_24_VALUE;
        if (monitorType === '24' && tier === 'premium') return LINKS.ARM_24_PREMIUM;
        if (monitorType === 'portable' && tier === 'value') return LINKS.ARM_PORTABLE_VALUE;
        if (monitorType === 'portable' && tier === 'premium') return LINKS.ARM_PORTABLE_PREMIUM;
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateHints() {
      const method = getValue('method');
      const monitorType = getValue('monitorType');
      const tier = getValue('tier');
      const hints = [];

      if (method === 'arm') {
        if (monitorType === '24') {
          hints.push('24인치 모니터를 세로로 사용하는 방식으로, 긴 스크롤 화면을 볼 수 있습니다.');
        } else if (monitorType === 'portable') {
          hints.push('포터블 모니터를 세로로 사용하는 방식으로, 긴 스크롤 화면을 보는 방식에는 적합하지 않습니다.');
        }
      }

      if (tier === 'value') {
        hints.push('‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.');
      } else if (tier === 'premium') {
        hints.push('‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.');
      }

      hintsEl.innerHTML = hints.map((text) => `<p class="hint">${text}</p>`).join('');
    }

    function updateButtonState() {
      const method = getValue('method');
      const monitorType = getValue('monitorType');
      const tier = getValue('tier');

      setTypeDisabled(method === 'pivot');

      let ready = false;
      if (method === 'pivot') ready = !!tier;
      if (method === 'arm') ready = !!(monitorType && tier);

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updateHints();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function () {
      const result = resolveLink();

      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
