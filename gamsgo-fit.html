<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>겜스고 적합성 평가</title>
  <meta name="description" content="이용하려는 서비스를 선택하면 겜스고의 적합한 서비스 페이지로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 38px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 18px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; line-height: 1.45; }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .check { position: relative; }
    .check input { position: absolute; opacity: 0; pointer-events: none; }
    .check label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.3;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .check label:hover { border-color: #d6d6db; }
    .check input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .check input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer { text-align: center; padding: 12px 16px 28px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      header { padding: 26px 16px 12px; }
      .container { width: min(94vw, 520px); padding: 18px; margin-bottom: 28px; }
      legend { font-size: 15px; }
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
      .check label { min-height: 46px; padding: 10px 8px; font-size: 13px; }
      .actions { justify-content: stretch; }
      .actions .msg { width: 100%; text-align: center; }
      button.primary { width: 100%; padding: 14px 16px; }
    }
  </style>
<script type="text/javascript" nonce="4bda8be192ad438196d05f8af5d" src="//local.adguard.org?ts=1783460101009&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_000000005a8c7209ba46bc1f459426de%26ts%3D495410%26p%3Dfs%26cid%3D1%26sig%3D9d75b8ee5a7beea719887e7d56a8e45a1eb6a689937df09938861b171fe3eafc%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="4bda8be192ad438196d05f8af5d" src="//local.adguard.org?ts=1783460101009&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>겜스고 적합성 평가</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>겜스고에서 이용하시려는 서비스를 모두 골라주세요.</legend>
          <div class="options" role="group" aria-label="겜스고 이용 서비스 선택">
            <div class="check">
              <input type="checkbox" id="svc-youtube" name="service" value="youtube">
              <label for="svc-youtube">유튜브 프리미엄</label>
            </div>
            <div class="check">
              <input type="checkbox" id="svc-ott" name="service" value="ott">
              <label for="svc-ott">OTT<br>(넷플릭스 등)</label>
            </div>
            <div class="check">
              <input type="checkbox" id="svc-ai" name="service" value="ai">
              <label for="svc-ai">AI<br>(챗GPT 등)</label>
            </div>
            <div class="check">
              <input type="checkbox" id="svc-spotify" name="service" value="spotify">
              <label for="svc-spotify">스포티파이</label>
            </div>
            <div class="check">
              <input type="checkbox" id="svc-vpn" name="service" value="vpn">
              <label for="svc-vpn">VPN</label>
            </div>
            <div class="check">
              <input type="checkbox" id="svc-other" name="service" value="other">
              <label for="svc-other">기타</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="겜스고 결과 보기">결과 보기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>서비스를 선택하면 적합한 페이지로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      youtube: "https://www.gamsgo.com/ko/details/youtube/partner/RqZaS",
      ott: "https://www.gamsgo.com/ko/details/disneyplus/partner/RqZaS",
      ai: "https://www.gamsgo.com/ko/details/chatgpt/partner/RqZaS",
      spotify: "https://www.gamsgo.com/ko/details/spotify/partner/RqZaS",
      vpn: "https://www.gamsgo.com/ko/details/n-vpn/partner/RqZaS",
      general: "https://www.gamsgo.com/partner/RqZaS"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getSelectedServices(){
      return Array.from(form.querySelectorAll('input[name="service"]:checked')).map(input => input.value);
    }

    function resolveLink(){
      const selected = getSelectedServices();

      if(selected.length === 0){
        return { error: '이용하시려는 서비스를 하나 이상 선택해 주세요.' };
      }

      if(selected.includes('other') || selected.length >= 2){
        return LINKS.general;
      }

      return LINKS[selected[0]] || LINKS.general;
    }

    function updateButtonState(){
      const selected = getSelectedServices();
      const ready = selected.length > 0;
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '서비스를 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
