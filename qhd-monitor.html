<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QHD 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 QHD 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 18px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 28px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 28px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 18px;
    }

    legend {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .options.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .options.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .radio { position: relative; }
    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label {
      outline: 0;
      box-shadow: 0 0 0 4px var(--ring);
    }

    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .pick-note {
      min-height: 18px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg {
      font-size: 13px;
      color: #a40000;
    }

    footer {
      text-align: center;
      padding: 10px 16px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 720px) {
      .options.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 480px) {
      header { padding: 22px 14px 12px; }
      .container {
        width: min(94vw, 520px);
        margin-bottom: 20px;
        padding: 16px;
        border-radius: 14px;
      }
      fieldset { margin-bottom: 15px; }
      legend { font-size: 15px; margin-bottom: 8px; }
      .options { gap: 8px; }
      .radio label {
        min-height: 42px;
        padding: 9px 8px;
        border-radius: 10px;
        font-size: 14px;
      }
      .pick-note { font-size: 12px; margin-top: 6px; }
      .actions {
        margin-top: 10px;
        justify-content: stretch;
      }
      .msg { width: 100%; min-height: 18px; }
      button.primary {
        width: 100%;
        padding: 13px 16px;
      }
      footer { padding-bottom: 18px; }
    }
  </style>
<script type="text/javascript" nonce="4bda8be192ad438196d05f8af5d" src="//local.adguard.org?ts=1783905833518&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_00000000a02c71f7a4c832e9c02a82cc%26ts%3D495530%26p%3Dfs%26cid%3D1%26sig%3D0b3c4d567822d36aae8938edcaa3b0a67cac69202fea5b6b24add9f43a899b21%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="4bda8be192ad438196d05f8af5d" src="//local.adguard.org?ts=1783905833518&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>QHD 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options four" role="radiogroup" aria-label="모니터 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-game" name="purpose" value="game">
              <label for="purpose-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-work" name="purpose" value="work">
              <label for="purpose-work">업무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-video" name="purpose" value="video">
              <label for="purpose-video">영상 시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-all" name="purpose" value="all">
              <label for="purpose-all">전부</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 가성비 픽, 프리미엄 픽 중에 무엇을 원하시나요?</legend>
          <div class="options two" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="pick-value" name="pick" value="value">
              <label for="pick-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="pick-note" class="pick-note" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      SIZE_24_DEFAULT: "https://link.coupang.com/a/eDllV5si72",
      SIZE_24_PREMIUM_WORK_VIDEO: "https://link.coupang.com/a/eDl5V9Ou2S",
      SIZE_27_GAME_VALUE: "https://link.coupang.com/a/fle0bToNi0",
      SIZE_27_WORK_VALUE: "https://link.coupang.com/a/flfdkwjLjM",
      SIZE_27_GAME_PREMIUM: "https://link.coupang.com/a/fle80L2woK",
      SIZE_27_WORK_PREMIUM: "https://link.coupang.com/a/eDkxuMFCO4",
      SIZE_32_GAME_VALUE: "https://link.coupang.com/a/eDkIuSdRJY",
      SIZE_32_WORK_VALUE: "https://link.coupang.com/a/flehVFG9YG",
      SIZE_32_GAME_PREMIUM: "https://link.coupang.com/a/eDkQtkzMAK",
      SIZE_32_WORK_PREMIUM: "https://link.coupang.com/a/flem3e4fEi"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const pickNoteEl = document.getElementById('pick-note');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function isGameGroup(purpose){
      return purpose === 'game' || purpose === 'all';
    }

    function isWorkGroup(purpose){
      return purpose === 'work' || purpose === 'video';
    }

    function resolveLink(){
      const size = getValue('size');
      const purpose = getValue('purpose');
      const pick = getValue('pick');

      if(!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if(!purpose) return { error: '모니터 용도를 선택해 주세요.' };
      if(!pick) return { error: '추천 유형을 선택해 주세요.' };

      if(size === '24' && isWorkGroup(purpose) && pick === 'premium') {
        return LINKS.SIZE_24_PREMIUM_WORK_VIDEO;
      }

      if(size === '24') {
        return LINKS.SIZE_24_DEFAULT;
      }

      if(size === '27') {
        if(isGameGroup(purpose) && pick === 'value') return LINKS.SIZE_27_GAME_VALUE;
        if(isWorkGroup(purpose) && pick === 'value') return LINKS.SIZE_27_WORK_VALUE;
        if(isGameGroup(purpose) && pick === 'premium') return LINKS.SIZE_27_GAME_PREMIUM;
        if(isWorkGroup(purpose) && pick === 'premium') return LINKS.SIZE_27_WORK_PREMIUM;
      }

      if(size === '32') {
        if(isGameGroup(purpose) && pick === 'value') return LINKS.SIZE_32_GAME_VALUE;
        if(isWorkGroup(purpose) && pick === 'value') return LINKS.SIZE_32_WORK_VALUE;
        if(isGameGroup(purpose) && pick === 'premium') return LINKS.SIZE_32_GAME_PREMIUM;
        if(isWorkGroup(purpose) && pick === 'premium') return LINKS.SIZE_32_WORK_PREMIUM;
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updatePickNote(){
      const pick = getValue('pick');

      if(pick === 'value') {
        pickNoteEl.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.';
        return;
      }

      if(pick === 'premium') {
        pickNoteEl.textContent = '‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
        return;
      }

      pickNoteEl.textContent = '';
    }

    function updateButtonState(){
      const size = getValue('size');
      const purpose = getValue('purpose');
      const pick = getValue('pick');
      const ready = !!(size && purpose && pick);

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updatePickNote();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();

      if(typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
