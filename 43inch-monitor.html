<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>43인치 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 43인치 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 30px 20px 14px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 38px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 32px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(16px, 3vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 18px; }
    legend { font-weight: 700; margin-bottom: 10px; font-size: 16px; line-height: 1.35; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 650;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      align-items: center;
      justify-content: center;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }
    footer { text-align: center; padding: 10px 16px 26px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      header { padding: 22px 16px 10px; }
      .container {
        width: min(94vw, 520px);
        margin-bottom: 22px;
        padding: 15px;
        border-radius: 14px;
      }
      fieldset { margin-bottom: 14px; }
      legend { font-size: 14.5px; margin-bottom: 8px; }
      .options { gap: 8px; }
      .radio label { min-height: 42px; padding: 9px 8px; font-size: 13.5px; border-radius: 10px; }
      .actions { margin-top: 8px; justify-content: stretch; }
      .msg { width: 100%; min-height: 18px; }
      button.primary { width: 100%; padding: 13px 16px; }
      footer { padding-bottom: 18px; }
    }
  </style>
<script type="text/javascript" nonce="db883a8612294d76b4617a05e7b" src="//local.adguard.org?ts=1781086933795&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_000000009348720bafbfeceb7915ae6d%26ts%3D494748%26p%3Dfs%26cid%3D1%26sig%3D48e7e0381646c1d68073bd4c66f90bdebfe6a439e8780e93f6bf4e7a19ed74ec%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=0"></script><script type="text/javascript" nonce="db883a8612294d76b4617a05e7b" src="//local.adguard.org?ts=1781086933795&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>43인치 모니터</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 가격은 어느 정도를 생각하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="가격대 선택">
            <div class="radio">
              <input type="radio" id="price-under" name="price" value="under50">
              <label for="price-under">50만원대 이하</label>
            </div>
            <div class="radio">
              <input type="radio" id="price-over" name="price" value="over50">
              <label for="price-over">50만원 초과</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 선명한 해상도(화질)의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="선명한 해상도 선호 선택">
            <div class="radio">
              <input type="radio" id="resolution-yes" name="resolution" value="yes">
              <label for="resolution-yes">네</label>
            </div>
            <div class="radio">
              <input type="radio" id="resolution-no" name="resolution" value="no">
              <label for="resolution-no">아니오</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. TV처럼 리모콘 사용을 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="리모콘 사용 선호 선택">
            <div class="radio">
              <input type="radio" id="remote-yes" name="remote" value="yes">
              <label for="remote-yes">원해요</label>
            </div>
            <div class="radio">
              <input type="radio" id="remote-no" name="remote" value="no">
              <label for="remote-no">원하지 않아요</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>4. 오래 사용해도 눈이 편안한 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="눈이 편안한 모니터 선호 선택">
            <div class="radio">
              <input type="radio" id="eye-yes" name="eye" value="yes">
              <label for="eye-yes">네, 편안한 제품을 원해요</label>
            </div>
            <div class="radio">
              <input type="radio" id="eye-no" name="eye" value="no">
              <label for="eye-no">상관없어요</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      REMOTE: "https://link.coupang.com/a/esxpzIfFRc",
      EYE_PREMIUM: "https://link.coupang.com/a/esxuv5O5dY",
      NO_RESOLUTION: "https://link.coupang.com/a/esxrKFN62m",
      DEFAULT: "https://link.coupang.com/a/esxyrVF70K"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const price = getValue('price');
      const resolution = getValue('resolution');
      const remote = getValue('remote');
      const eye = getValue('eye');

      if(!price) return { error: '가격대를 선택해 주세요.' };
      if(!resolution) return { error: '해상도 선호를 선택해 주세요.' };
      if(!remote) return { error: '리모콘 사용 여부를 선택해 주세요.' };
      if(!eye) return { error: '눈이 편안한 모니터 선호를 선택해 주세요.' };

      if(remote === 'yes') return LINKS.REMOTE;
      if(price === 'over50' && eye === 'yes') return LINKS.EYE_PREMIUM;
      if(resolution === 'no') return LINKS.NO_RESOLUTION;
      return LINKS.DEFAULT;
    }

    function updateButtonState(){
      const ready = !!(
        getValue('price') &&
        getValue('resolution') &&
        getValue('remote') &&
        getValue('eye')
      );
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
