<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>フルHDモニターおすすめガイド</title>
  <meta name="description" content="質問に答えると、用途に合ったフルHDモニターをご案内します。">
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #fff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --ring: rgba(74, 42, 116, .35);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    header { padding: 30px 20px 16px; text-align: center; color: #fff; }
    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.15);
    }
    .container {
      width: min(900px, 92vw);
      margin: 0 auto 30px;
      padding: clamp(18px, 3.2vw, 28px);
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.15);
    }
    fieldset { margin: 0 0 22px; padding: 0; border: 0; }
    legend { margin-bottom: 12px; font-size: 16px; font-weight: 700; }
    .options { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .options.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .options.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 11px 10px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      text-align: center;
      font-weight: 600;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,.18);
      transform: translateY(-1px);
    }
    .hint { min-height: 2.6em; margin: 8px 2px 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .hint:empty { display: none; }
    .actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 14px; }
    .msg { flex: 1; color: #a40000; font-size: 13px; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,.25);
    }
    button:hover { box-shadow: 0 16px 32px rgba(74,42,116,.32); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .6; cursor: not-allowed; box-shadow: none; }
    @media (max-width: 640px) {
      header { padding: 20px 14px 11px; }
      h1 { font-size: 22px; }
      .container { width: min(94vw, 900px); margin-bottom: 18px; padding: 16px 14px; border-radius: 14px; }
      fieldset { margin-bottom: 16px; }
      legend { margin-bottom: 8px; font-size: 14px; line-height: 1.35; }
      .options, .options.three, .options.two { gap: 7px; }
      .options.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .options.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .radio label { min-height: 42px; padding: 9px 6px; font-size: 13px; }
      .hint { min-height: 0; margin-top: 6px; font-size: 11px; }
      .actions { margin-top: 10px; }
      button { padding: 12px 17px; }
    }
  </style>
<script type="text/javascript" nonce="4bda8be192ad438196d05f8af5d" src="//local.adguard.org?ts=1783809328108&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_00000000bb14720c95564a055e71a214%26fn%3DFHD-monitor-guide-ja.html%26cd%3Dattachment%26ts%3D495502%26p%3Dfs%26cid%3D1%26sig%3D81490f2f77df01e0fabde10842c1f1ed8d422cef288728e3c7b73405ebeec744%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="4bda8be192ad438196d05f8af5d" src="//local.adguard.org?ts=1783809328108&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header><h1>フルHDモニターおすすめガイド</h1></header>
    <main class="container">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. どのサイズのモニターをお探しですか？</legend>
          <div class="options three" role="radiogroup" aria-label="モニターサイズ">
            <div class="radio"><input id="size-24" name="size" type="radio" value="24"><label for="size-24">24インチ</label></div>
            <div class="radio"><input id="size-27" name="size" type="radio" value="27"><label for="size-27">27インチ</label></div>
            <div class="radio"><input id="size-32" name="size" type="radio" value="32"><label for="size-32">32インチ</label></div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. モニターの主な用途は何ですか？</legend>
          <div class="options" role="radiogroup" aria-label="モニターの主な用途">
            <div class="radio"><input id="purpose-game" name="purpose" type="radio" value="game"><label for="purpose-game">ゲーミング</label></div>
            <div class="radio"><input id="purpose-work" name="purpose" type="radio" value="work"><label for="purpose-work">仕事・Web閲覧</label></div>
            <div class="radio"><input id="purpose-video" name="purpose" type="radio" value="video"><label for="purpose-video">動画視聴</label></div>
            <div class="radio"><input id="purpose-all" name="purpose" type="radio" value="all"><label for="purpose-all">すべて</label></div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 「コスパ重視セレクト」と「プレミアセレクト」のどちらを希望しますか？</legend>
          <div class="options two" role="radiogroup" aria-label="おすすめタイプ">
            <div class="radio"><input id="tier-value" name="tier" type="radio" value="value"><label for="tier-value">コスパ重視セレクト</label></div>
            <div class="radio"><input id="tier-premium" name="tier" type="radio" value="premium"><label for="tier-premium">プレミアセレクト</label></div>
          </div>
          <p id="tier-hint" class="hint" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" type="button" disabled>おすすめを見る</button>
        </div>
      </form>
    </main>
  </div>

  <noscript>このガイドを利用するには、JavaScriptを有効にしてください。</noscript>
  <script>
    const LINKS = {
      24: {
        game:  { value: 'https://amzn.to/4bDYjmq', premium: 'https://amzn.to/44WxndT' },
        work:  { value: 'https://amzn.to/4vq776u', premium: 'https://amzn.to/3TafOEz' },
        video: { value: 'https://amzn.to/4vq776u', premium: 'https://amzn.to/3TafOEz' },
        all:   { value: 'https://amzn.to/4bDYjmq', premium: 'https://amzn.to/44WxndT' }
      },
      27: {
        game:  { value: 'https://amzn.to/4f9S2QC', premium: 'https://amzn.to/3SYQd1k' },
        work:  { value: 'https://amzn.to/4w1GplU', premium: 'https://amzn.to/4fsLrls' },
        video: { value: 'https://amzn.to/4w1GplU', premium: 'https://amzn.to/4fsLrls' },
        all:   { value: 'https://amzn.to/4f9S2QC', premium: 'https://amzn.to/3SYQd1k' }
      },
      32: 'https://amzn.to/4vZs9du'
    };

    const form = document.getElementById('guide-form');
    const goBtn = document.getElementById('go');
    const msgEl = document.getElementById('msg');
    const hintEl = document.getElementById('tier-hint');

    function valueOf(name) {
      return form.querySelector(`input[name="${name}"]:checked`)?.value || null;
    }

    function update() {
      const size = valueOf('size');
      const purpose = valueOf('purpose');
      const tier = valueOf('tier');

      if (tier === 'value') {
        hintEl.textContent = '「コスパ重視セレクト」は価格を重視した選択肢のため、品質や安定性がやや劣る場合があります。';
      } else if (tier === 'premium') {
        hintEl.textContent = '「プレミアセレクト」は品質と安定性を重視した選択肢のため、価格が高くなる場合があります。';
      } else {
        hintEl.textContent = '';
      }

      const ready = size === '32' || Boolean(size && purpose && tier);
      goBtn.disabled = !ready;
      msgEl.textContent = '';
    }

    function resolveLink() {
      const size = valueOf('size');
      const purpose = valueOf('purpose');
      const tier = valueOf('tier');
      if (size === '32') return LINKS[32];
      return size && purpose && tier ? LINKS[size][purpose][tier] : null;
    }

    form.addEventListener('change', update);
    goBtn.addEventListener('click', () => {
      const url = resolveLink();
      if (!url) {
        msgEl.textContent = 'すべての項目を選択してください。';
        return;
      }
      const link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer nofollow sponsored';
      document.body.appendChild(link);
      link.click();
      link.remove();
    });
  </script>
</body>
</html>
