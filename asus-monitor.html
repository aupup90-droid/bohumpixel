<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASUS 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 ASUS 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 18px 14px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(860px, 92vw);
      margin: 0 auto 30px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(16px, 3vw, 26px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 18px; }
    legend { font-weight: 700; margin-bottom: 10px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .options.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .options.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: block;
      width: 100%;
      padding: 12px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
      line-height: 1.35;
      word-break: keep-all;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer { text-align: center; padding: 10px 16px 24px; font-size: 12px; color: rgba(255,255,255,0.88); }

    @media (max-width: 640px) {
      header { padding-top: 24px; }
      .container { width: min(94vw, 860px); }
      .options, .options.two, .options.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .radio label { padding: 11px 10px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ASUS 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options four" role="radiogroup" aria-label="모니터 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-game" name="purpose" value="game">
              <label for="purpose-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-office" name="purpose" value="office">
              <label for="purpose-office">사무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-video" name="purpose" value="video">
              <label for="purpose-video">영상시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-design" name="purpose" value="design">
              <label for="purpose-design">시각디자인</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 가성비에서 좀 더 신경쓰는 것은 무엇인가요?</legend>
          <div class="options two" role="radiogroup" aria-label="가성비 기준 선택">
            <div class="radio">
              <input type="radio" id="pref-price" name="preference" value="price">
              <label for="pref-price">가격</label>
            </div>
            <div class="radio">
              <input type="radio" id="pref-performance" name="preference" value="performance">
              <label for="pref-performance">성능</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      SIZE_24: "https://link.coupang.com/a/eu5nd1",
      SIZE_27_GAME_PRICE: "https://link.coupang.com/a/eu5FKz",
      SIZE_27_GAME_PERFORMANCE: "https://link.coupang.com/a/eu1VFw",
      SIZE_27_OFFICE_VIDEO: "https://link.coupang.com/a/eu5N0H",
      SIZE_27_DESIGN: "https://link.coupang.com/a/eu5SfH",
      SIZE_32_PRICE: "https://link.coupang.com/a/eu5Wu8",
      SIZE_32_PERFORMANCE: "https://link.coupang.com/a/eu1544"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getValue(name) {
      const checked = form.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : null;
    }

    function resolveLink() {
      const size = getValue('size');
      const purpose = getValue('purpose');
      const preference = getValue('preference');

      if (!size || !purpose || !preference) {
        return { error: '필수 항목을 선택해 주세요.' };
      }

      if (size === '24') return LINKS.SIZE_24;

      if (size === '27') {
        if (purpose === 'game') {
          return preference === 'price'
            ? LINKS.SIZE_27_GAME_PRICE
            : LINKS.SIZE_27_GAME_PERFORMANCE;
        }
        if (purpose === 'office' || purpose === 'video') {
          return LINKS.SIZE_27_OFFICE_VIDEO;
        }
        if (purpose === 'design') {
          return LINKS.SIZE_27_DESIGN;
        }
      }

      if (size === '32') {
        return preference === 'price'
          ? LINKS.SIZE_32_PRICE
          : LINKS.SIZE_32_PERFORMANCE;
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateButtonState() {
      const ready = !!(getValue('size') && getValue('purpose') && getValue('preference'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', () => {
      const result = resolveLink();
      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else {
        msgEl.textContent = result.error || '오류가 발생했습니다.';
      }
    });
  </script>
</body>
</html>
