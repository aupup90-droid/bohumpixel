<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>240hz 추천가이드</title>
  <meta name="description" content="패널과 픽 유형을 선택하면 상황에 맞는 240hz 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
      --line: #e5e5e8;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 30px 20px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 38px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(860px, 92vw);
      margin: 0 auto 30px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(16px, 3vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 18px; }
    fieldset:last-of-type { margin-bottom: 12px; }
    legend {
      font-weight: 800;
      margin-bottom: 10px;
      font-size: clamp(15px, 2.8vw, 17px);
      letter-spacing: -0.01em;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .options.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .hints {
      display: grid;
      gap: 6px;
      min-height: 44px;
      margin-top: 10px;
    }

    .hint {
      display: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: -0.01em;
    }

    .hint.show { display: block; }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .msg {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      color: #a40000;
      line-height: 1.35;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
      white-space: nowrap;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    footer {
      text-align: center;
      padding: 10px 16px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 640px) {
      header { padding: 24px 16px 12px; }
      .container { width: min(94vw, 860px); margin-bottom: 24px; }
      .options { grid-template-columns: 1fr; gap: 8px; }
      .options.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .radio label { min-height: 42px; padding: 10px 10px; font-size: 14px; }
      fieldset { margin-bottom: 16px; }
      .hints { min-height: 58px; gap: 4px; }
      .hint { font-size: 12px; line-height: 1.38; }
      .actions { margin-top: 10px; }
      button.primary { padding: 13px 15px; font-size: 14px; }
    }

    @media (max-width: 360px) {
      .options.two { grid-template-columns: 1fr; }
      .actions { flex-direction: column; align-items: stretch; }
      button.primary { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>240hz 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>어떤 패널을 선택하실 건가요?</legend>
          <div class="options" role="radiogroup" aria-label="패널 선택">
            <div class="radio">
              <input type="radio" id="panel-ips" name="panel" value="ips">
              <label for="panel-ips">IPS 패널</label>
            </div>
            <div class="radio">
              <input type="radio" id="panel-tn" name="panel" value="tn">
              <label for="panel-tn">TN 패널</label>
            </div>
            <div class="radio">
              <input type="radio" id="panel-oled" name="panel" value="oled">
              <label for="panel-oled">OLED 패널</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>가성비 픽과 프리미엄 픽 중에 무엇을 선택 하실건가요?</legend>
          <div class="options two" role="radiogroup" aria-label="픽 유형 선택">
            <div class="radio">
              <input type="radio" id="pick-value" name="pick" value="value">
              <label for="pick-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
        </fieldset>

        <div class="hints" aria-live="polite">
          <p id="hint-panel" class="hint"></p>
          <p id="hint-pick" class="hint"></p>
        </div>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      ips_value: "https://link.coupang.com/a/dWaxGtH260",
      ips_premium: "https://link.coupang.com/a/dWcwv1O9PU",
      tn_value: "https://link.coupang.com/a/dWcC6elwqG",
      tn_premium: "https://link.coupang.com/a/dWbxWLMwfs",
      oled_value: "https://link.coupang.com/a/dWbODZHLoa",
      oled_premium: "https://link.coupang.com/a/dWb16aj8KG"
    };

    const HINTS = {
      panel: {
        ips: "‘IPS 패널’은 가격이 저렴하고 화질이 좋은 패널이지만, 고스팅 현상이 발생할 수 있습니다.",
        tn: "‘TN 패널’은 고스팅 현상이 거의 없는 패널이지만, 화질과 시야각이 떨어질 수 있습니다.",
        oled: "‘OLED 패널’은 고스팅 현상이 거의 없으며, 화질이 훌륭하지만 가격이 비쌉니다."
      },
      pick: {
        value: "‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 성능이 떨어질 수 있습니다.",
        premium: "‘프리미엄 픽’은 성능에 중점을 둔 선택지로, 가격대가 높을 수 있습니다."
      }
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const panelHintEl = document.getElementById('hint-panel');
    const pickHintEl = document.getElementById('hint-pick');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const panel = getValue('panel');
      const pick = getValue('pick');

      if(!panel) return { error: '패널을 선택해 주세요.' };
      if(!pick) return { error: '픽 유형을 선택해 주세요.' };

      const key = `${panel}_${pick}`;
      return LINKS[key] || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateHints(){
      const panel = getValue('panel');
      const pick = getValue('pick');

      panelHintEl.textContent = panel ? HINTS.panel[panel] : '';
      panelHintEl.classList.toggle('show', !!panel);

      pickHintEl.textContent = pick ? HINTS.pick[pick] : '';
      pickHintEl.classList.toggle('show', !!pick);
    }

    function updateButtonState(){
      updateHints();
      const ready = !!(getValue('panel') && getValue('pick'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
