<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>게임 VPN 적합성 평가</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 게임 VPN 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: --bg;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 22px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: block;
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer {
      text-align: center;
      padding: 12px 16px 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 640px) {
      .options { grid-template-columns: 1fr; }
    }
  </style>
<script type="text/javascript" nonce="73a93b142ca84318ac6dd2cf382" src="//local.adguard.org?ts=1775447976906&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_00000000a00c72098f471b0f6839a2a8%26ts%3D493180%26p%3Dfs%26cid%3D1%26sig%3D9b00ffb9ee3c431ca84d142e727731950d5b720cea020f4b4e308006f9090680%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="73a93b142ca84318ac6dd2cf382" src="//local.adguard.org?ts=1775447976906&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>게임 VPN 적합성 평가</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 주로 하시는 게임 플랫폼은 무엇인가요?</legend>
          <div class="options" role="radiogroup" aria-label="게임 플랫폼 선택">
            <div class="radio">
              <input type="radio" id="platform-pc" name="platform" value="pc">
              <label for="platform-pc">PC 게임</label>
            </div>
            <div class="radio">
              <input type="radio" id="platform-mobile" name="platform" value="mobile">
              <label for="platform-mobile">모바일 게임</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. VPN 켠채로 게임을 하루 몇시간 하실건가요?</legend>
          <div class="options" role="radiogroup" aria-label="하루 게임 시간 선택">
            <div class="radio">
              <input type="radio" id="hours-low" name="hours" value="under3">
              <label for="hours-low">3시간 이하</label>
            </div>
            <div class="radio">
              <input type="radio" id="hours-high" name="hours" value="over3">
              <label for="hours-high">3시간 이상</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 둘 중에 더 중요하게 생각하는 요소는 무엇인가요?</legend>
          <div class="options" role="radiogroup" aria-label="중요 요소 선택">
            <div class="radio">
              <input type="radio" id="priority-fast" name="priority" value="fast">
              <label for="priority-fast">조금이라도 응답속도가 더 빠른 VPN</label>
            </div>
            <div class="radio">
              <input type="radio" id="priority-auto" name="priority" value="auto">
              <label for="priority-auto">새로고침 없이도 최적의 서버를 찾아주는 VPN</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      NORD: "https://go.nordvpn.net/aff_c?offer_id=266&aff_id=89429",
      EXITLAG: "https://www.exitlag.com/refer/10287838",
      MUDFISH: "https://mudfish.net/"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink() {
      const platform = getValue('platform');
      const hours = getValue('hours');
      const priority = getValue('priority');

      if (!platform) return { error: '게임 플랫폼을 선택해 주세요.' };
      if (!hours) return { error: '하루 게임 시간을 선택해 주세요.' };
      if (!priority) return { error: '중요하게 생각하는 요소를 선택해 주세요.' };

      if (platform === 'pc' && priority === 'fast') return LINKS.NORD;
      if (platform === 'pc' && priority === 'auto') return LINKS.EXITLAG;
      if (platform === 'mobile' && hours === 'under3') return LINKS.MUDFISH;
      return LINKS.EXITLAG;
    }

    function updateButtonState() {
      const ready = !!(getValue('platform') && getValue('hours') && getValue('priority'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function () {
      const result = resolveLink();
      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
