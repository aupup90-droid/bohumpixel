<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>게이밍 모니터 추천가이드</title>
  <meta name="description" content="게임 장르와 선택 기준에 맞는 게이밍 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 32px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 20px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .options.pick { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .choice { position: relative; }
    .choice input { position: absolute; opacity: 0; pointer-events: none; }
    .choice label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .choice label:hover { border-color: #d6d6db; }
    .choice input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .choice input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .hint {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }
    footer { text-align: center; padding: 10px 16px 24px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      header { padding: 24px 16px 12px; }
      .container { width: min(560px, 94vw); margin-bottom: 24px; padding: 16px; }
      fieldset { margin-bottom: 16px; }
      legend { font-size: 15px; margin-bottom: 10px; }
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .choice label { min-height: 44px; padding: 9px 8px; font-size: 14px; border-radius: 11px; }
      .hint { font-size: 11px; margin-top: 6px; }
      .actions { justify-content: stretch; }
      .actions .msg { width: 100%; }
      button.primary { width: 100%; padding: 13px 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>게이밍 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 주로 하시는 게임 장르를 모두 선택해주세요.</legend>
          <div class="options" role="group" aria-label="게임 장르 선택">
            <div class="choice">
              <input type="checkbox" id="genre-fps" name="genre" value="fps">
              <label for="genre-fps">FPS</label>
            </div>
            <div class="choice">
              <input type="checkbox" id="genre-aos" name="genre" value="aos">
              <label for="genre-aos">AOS(롤)</label>
            </div>
            <div class="choice">
              <input type="checkbox" id="genre-console" name="genre" value="console">
              <label for="genre-console">콘솔·스팀 게임</label>
            </div>
            <div class="choice">
              <input type="checkbox" id="genre-mmorpg" name="genre" value="mmorpg">
              <label for="genre-mmorpg">MMORPG</label>
            </div>
            <div class="choice">
              <input type="checkbox" id="genre-strategy" name="genre" value="strategy">
              <label for="genre-strategy">전략 시뮬</label>
            </div>
            <div class="choice">
              <input type="checkbox" id="genre-racing" name="genre" value="racing">
              <label for="genre-racing">스포츠/레이싱</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 가성비 픽과 프리미엄 픽 중 무엇을 선택하시겠어요?</legend>
          <div class="options pick" role="radiogroup" aria-label="픽 선택">
            <div class="choice">
              <input type="radio" id="pick-value" name="pick" value="value">
              <label for="pick-value">가성비 픽</label>
            </div>
            <div class="choice">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
          <div id="pick-hint" class="hint" aria-live="polite"></div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>장르와 픽을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      value: {
        multi: "https://link.coupang.com/a/d3FATqBTtQ",
        fps: "https://link.coupang.com/a/d3ANdTCIP6",
        mmorpg: "https://link.coupang.com/a/d3EirioCWa",
        strategy: "https://link.coupang.com/a/d3ESTcbAT6",
        console: "https://link.coupang.com/a/d3Dva6SjS0",
        aos: "https://link.coupang.com/a/d3Ct6iCQ2K",
        racing: "https://link.coupang.com/a/d3I3Tq5FHU"
      },
      premium: {
        multi: "https://link.coupang.com/a/d3FNADwok8",
        fps: "https://link.coupang.com/a/d3Ce9WvBKK",
        mmorpg: "https://link.coupang.com/a/d3EGGpNVVQ",
        strategy: "https://link.coupang.com/a/d3EGGpNVVQ",
        console: "https://link.coupang.com/a/d3DN8jB0xM",
        aos: "https://link.coupang.com/a/d3DagxTKSa",
        racing: "https://link.coupang.com/a/d3FpKsB1i0"
      }
    };

    const PRIORITY = ["fps", "mmorpg", "strategy", "console", "aos", "racing"];
    const HINTS = {
      value: "‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.",
      premium: "‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다."
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const hintEl = document.getElementById('pick-hint');

    function getSelectedGenres(){
      return Array.from(form.querySelectorAll('input[name="genre"]:checked')).map(el => el.value);
    }

    function getPick(){
      const el = form.querySelector('input[name="pick"]:checked');
      return el ? el.value : null;
    }

    function resolveGenre(genres){
      if(genres.length >= 3) return 'multi';
      return PRIORITY.find(genre => genres.includes(genre)) || null;
    }

    function resolveLink(){
      const genres = getSelectedGenres();
      const pick = getPick();

      if(genres.length === 0) return { error: '게임 장르를 선택해 주세요.' };
      if(!pick) return { error: '가성비 픽 또는 프리미엄 픽을 선택해 주세요.' };

      const genre = resolveGenre(genres);
      return LINKS[pick][genre] || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateState(){
      const genres = getSelectedGenres();
      const pick = getPick();

      hintEl.textContent = pick ? HINTS[pick] : '';
      goBtn.disabled = !(genres.length > 0 && pick);
      msgEl.textContent = goBtn.disabled ? '필수 항목을 선택해 주세요.' : '';
    }

    form.addEventListener('change', updateState);
    updateState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
