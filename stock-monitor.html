<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>주식 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 주식 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }
    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }
    fieldset { border: 0; padding: 0; margin: 0 0 22px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }
    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: block;
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.45; margin-top: 8px; display: none; }
    .hint.is-visible { display: block; }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
    .msg { font-size: 13px; color: #a40000; }
    footer { text-align: center; padding: 12px 16px 28px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      header { padding: 24px 16px 12px; }
      .container { width: min(480px, 92vw); margin-bottom: 24px; padding: 18px; }
      fieldset { margin-bottom: 18px; }
      legend { font-size: 15px; margin-bottom: 10px; }
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .radio label { padding: 11px 10px; font-size: 14px; }
      .hint { font-size: 12px; margin-top: 7px; }
      .actions { justify-content: stretch; }
      button.primary { width: 100%; padding: 13px 16px; }
      .msg { width: 100%; text-align: center; }
      footer { padding-bottom: 22px; }
    }
  </style>
<script type="text/javascript" nonce="20680dfe3515408199c35f2d089" src="//local.adguard.org?ts=1782302493552&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_000000002e78720bba268a9b198904c9%26fn%3Dstock-monitor-guide.html%26cd%3Dattachment%26ts%3D495084%26p%3Dfs%26cid%3D1%26sig%3D0818b1f5084fc35a4d0824734b2074fd0ad6a3130bd2a6fc9306e6bd29d6f82d%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="20680dfe3515408199c35f2d089" src="//local.adguard.org?ts=1782302493552&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>주식 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 원하시는 사이즈를 알려주세요</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-wide" name="size" value="wide">
              <label for="size-wide">와이드 모니터</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-43" name="size" value="43">
              <label for="size-43">43인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-quad" name="size" value="quad27">
              <label for="size-quad">27인치 X 4대</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 가성비 픽, 프리미엄 픽 중에 무엇을 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="pick-budget" name="pick" value="budget">
              <label for="pick-budget">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="budget-hint" class="hint">‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.</p>
          <p id="premium-hint" class="hint">‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.</p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      "32_budget": "https://link.coupang.com/a/ePYuQjhZvg",
      "32_premium": "https://link.coupang.com/a/ePYDjcrt5U",
      "wide_budget": "https://link.coupang.com/a/ePYFKauK05",
      "wide_premium": "https://link.coupang.com/a/ePYT4CXSW4",
      "43_budget": "https://link.coupang.com/a/ePYYUAqM32",
      "43_premium": "https://link.coupang.com/a/ePYYUAqM32",
      "quad27_budget": "https://link.coupang.com/a/ePZb8hZANo",
      "quad27_premium": "https://link.coupang.com/a/eQre02PRMi"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const budgetHint = document.getElementById('budget-hint');
    const premiumHint = document.getElementById('premium-hint');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const size = getValue('size');
      const pick = getValue('pick');

      if(!size) return { error: '원하시는 사이즈를 먼저 선택해 주세요.' };
      if(!pick) return { error: '추천 유형을 선택해 주세요.' };

      const key = `${size}_${pick}`;
      return LINKS[key] || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateHints(){
      const pick = getValue('pick');
      budgetHint.classList.toggle('is-visible', pick === 'budget');
      premiumHint.classList.toggle('is-visible', pick === 'premium');
    }

    function updateButtonState(){
      const ready = !!(getValue('size') && getValue('pick'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updateHints();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
