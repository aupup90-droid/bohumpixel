<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>스포티파이 할인 가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 스포티파이 할인/구독 경로로 안내합니다." />
  <style>
    :root {
      /* dual-monitor.html과 동일한 톤 & 컴포넌트 스타일 */
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: --bg;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 22px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    /* pill radios (dual-monitor와 동일한 동작/포커스) */
    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: block; width: 100%; padding: 12px 14px; border: 1.5px solid #e5e5e8; border-radius: 12px;
      background: #fff; color: var(--text); text-align: center; font-weight: 600; cursor: pointer; user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease, opacity .2s ease;
      line-height: 1.25;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }
    .radio input:disabled + label { opacity: 0.55; cursor: not-allowed; box-shadow: none; transform: none; }

    .hint { color: var(--muted); font-size: 13px; margin-top: 6px; }

    .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
    button.primary {
      appearance: none; border: 0; border-radius: 999px; padding: 14px 18px; font-weight: 800; letter-spacing: 0.02em;
      background: var(--primary); color: var(--primary-contrast); cursor: pointer; box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }
    .msg.info { color: var(--primary); }

    footer { text-align: center; padding: 12px 16px 28px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) { .options { grid-template-columns: repeat(1, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>스포티파이 할인 가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <!-- Q1: 기존 스포티파이 이용 여부 -->
        <fieldset>
          <legend>1. 이미 스포티파이를 사용하고 계신가요?</legend>
          <div class="options" role="radiogroup" aria-label="스포티파이 사용 여부 선택">
            <div class="radio">
              <input type="radio" id="used-yes" name="used" value="yes">
              <label for="used-yes">네</label>
            </div>
            <div class="radio">
              <input type="radio" id="used-no" name="used" value="no">
              <label for="used-no">아니오</label>
            </div>
          </div>
        </fieldset>

        <!-- Q2: 청취 방식 선호 -->
        <fieldset>
          <legend>2. 내가 직접 만든 플레이리스트와 추천 알고리즘, 둘 중 어떤 방식으로 노래 듣기를 선호하나요?</legend>
          <div class="options" role="radiogroup" aria-label="청취 방식 선호 선택">
            <div class="radio">
              <input type="radio" id="pref-playlist" name="pref" value="playlist">
              <label for="pref-playlist">플레이리스트</label>
            </div>
            <div class="radio">
              <input type="radio" id="pref-algo" name="pref" value="algo">
              <label for="pref-algo">추천 알고리즘</label>
            </div>
          </div>
          <div class="hint">※ 이 문항은 “대학생이 아님 + 스포티파이 사용 중(네)”인 경우에만 반영됩니다.</div>
        </fieldset>

        <!-- Q3: 대학생 여부 -->
        <fieldset>
          <legend>3. 현재 대학생이신가요?</legend>
          <div class="options" role="radiogroup" aria-label="대학생 여부 선택">
            <div class="radio">
              <input type="radio" id="stu-yes" name="student" value="yes">
              <label for="stu-yes">대학생 입니다.</label>
            </div>
            <div class="radio">
              <input type="radio" id="stu-no" name="student" value="no">
              <label for="stu-no">아닙니다.</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>필수 항목을 선택하면 가장 적합한 할인/구독 경로로 안내합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    // 링크 맵 (요청 사양)
    const LINKS = {
      STUDENT: "https://www.spotify.com/kr-ko/student/",
      GAMS_GO: "https://www.gamsgo.com/ko/details/spotify/partner/RqZaS"
    };

    const MESSAGES = {
      ONE_ACCOUNT: "이용자님에게 적합한 상품은 겜스고의 [1개 계정]플랜 입니다. 잠시 후 겜스고 스포티파이 페이지로 이동합니다.",
      TOPUP: "이용자님에게 적합한 상품은 겜스고의 [본인계정 충전]플랜 입니다. 잠시 후 겜스고 스포티파이 페이지로 이동합니다."
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    let redirectTimer = null;

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function setMessage(text, { info = false } = {}){
      msgEl.textContent = text || '';
      msgEl.classList.toggle('info', !!(info && text));
    }

    function openNewTab(url){
      // 사용자 클릭(gesture)에서만 안전하게 동작
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer nofollow sponsored';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function syncConditionalUI(){
      const student = getValue('student');
      const used = getValue('used');
      const prefInputs = Array.from(form.querySelectorAll('input[name="pref"]'));

      const shouldEnablePref = (student === 'no' && used === 'yes');
      prefInputs.forEach(inp => { inp.disabled = !shouldEnablePref; });

      // 필요 없는 경우 선택값 초기화
      if(!shouldEnablePref){
        prefInputs.forEach(inp => { inp.checked = false; });
      }
    }

    function resolveRecommendation(){
      const student = getValue('student');
      const used = getValue('used');
      const pref = getValue('pref');

      if(!student) return { error: '대학생 여부를 선택해 주세요.' };

      // 규칙 1) 대학생 최우선
      if(student === 'yes'){
        return {
          url: LINKS.STUDENT,
          mode: 'new_tab',
          delayMs: 0,
          message: ''
        };
      }

      // 이하: 대학생 아님
      if(!used) return { error: '스포티파이 사용 여부를 선택해 주세요.' };

      // 규칙 2) 스포티파이 미사용 + 비학생 → 겜스고 1개 계정
      if(used === 'no'){
        return {
          url: LINKS.GAMS_GO,
          mode: 'redirect',
          delayMs: 3000,
          message: MESSAGES.ONE_ACCOUNT
        };
      }

      // 규칙 3) 스포티파이 사용 중 + 비학생
      if(!pref) return { error: '선호하는 듣기 방식을 선택해 주세요.' };

      // (플레이리스트) → 겜스고 1개 계정
      if(pref === 'playlist'){
        return {
          url: LINKS.GAMS_GO,
          mode: 'redirect',
          delayMs: 3000,
          message: MESSAGES.ONE_ACCOUNT
        };
      }

      // (추천 알고리즘) → 겜스고 본인계정 충전
      if(pref === 'algo'){
        return {
          url: LINKS.GAMS_GO,
          mode: 'redirect',
          delayMs: 3000,
          message: MESSAGES.TOPUP
        };
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateButtonState(){
      syncConditionalUI();

      const student = getValue('student');
      const used = getValue('used');
      const pref = getValue('pref');

      let ready = false;
      let helperMsg = '';

      if(!student){
        ready = false;
        helperMsg = '대학생 여부를 선택해 주세요.';
      } else if(student === 'yes'){
        ready = true;
      } else {
        // student === 'no'
        if(!used){
          ready = false;
          helperMsg = '스포티파이 사용 여부를 선택해 주세요.';
        } else if(used === 'no'){
          ready = true;
        } else {
          // used === 'yes'
          ready = !!pref;
          if(!pref) helperMsg = '선호하는 듣기 방식을 선택해 주세요.';
        }
      }

      goBtn.disabled = !ready;
      if(!ready){
        setMessage(helperMsg || '필수 항목을 선택해 주세요.', { info: false });
      } else {
        // 안내 메시지는 클릭 시 표기하므로, 준비 완료 시에는 기본 메시지만 비움
        if(!msgEl.classList.contains('info')) setMessage('', { info: false });
      }
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      // 이전 타이머 정리
      if(redirectTimer){
        clearTimeout(redirectTimer);
        redirectTimer = null;
      }

      const result = resolveRecommendation();
      if(result && result.error){
        setMessage(result.error, { info: false });
        goBtn.disabled = false;
        return;
      }

      // 학생: 즉시 새 탭 오픈 (팝업 차단 회피)
      if(result.mode === 'new_tab'){
        setMessage('', { info: false });
        openNewTab(result.url);
        return;
      }

      // 겜스고: 안내 문구 → 3초 뒤 이동
      setMessage(result.message, { info: true });
      goBtn.disabled = true;

      redirectTimer = setTimeout(() => {
        window.location.href = result.url;
      }, Math.max(0, result.delayMs || 0));
    });
  </script>
</body>
</html>
