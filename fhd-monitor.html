<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FHD 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 조건에 맞는 FHD 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 18px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(23px, 5vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 30px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(16px, 3vw, 28px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 18px;
    }

    legend {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .options.size { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .options.purpose { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .options.pick { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .radio { position: relative; }
    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .hint {
      min-height: 18px;
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg {
      color: #a40000;
      font-size: 13px;
      line-height: 1.4;
    }

    footer {
      text-align: center;
      padding: 10px 16px 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 720px) {
      header { padding-top: 22px; }
      .container { margin-bottom: 22px; }
      .options.purpose { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 420px) {
      .container {
        width: min(94vw, 900px);
        padding: 15px;
        border-radius: 14px;
      }
      fieldset { margin-bottom: 15px; }
      legend { font-size: 15px; margin-bottom: 8px; }
      .options { gap: 8px; }
      .radio label {
        min-height: 42px;
        padding: 9px 7px;
        border-radius: 11px;
        font-size: 13px;
      }
      .hint, .msg { font-size: 12px; }
      .actions { justify-content: stretch; }
      button.primary { width: 100%; padding: 13px 16px; }
    }
  </style>
<script type="text/javascript" nonce="7b17cc1f36794de1a604b80a768" src="//local.adguard.org?ts=1781774406323&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_000000002cbc720c8c1f0578b438e2e8%26fn%3Dfhd-monitor-guide.html%26cd%3Dattachment%26ts%3D494938%26p%3Dfs%26cid%3D1%26sig%3D0c904a74c2352f3d00ee6f934236eeaa6241bf3074d9c873b5b987fc7488f218%26v%3D0&amp;app=com.google.Chrome&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=0"></script><script type="text/javascript" nonce="7b17cc1f36794de1a604b80a768" src="//local.adguard.org?ts=1781774406323&amp;name=AdGuard%20Extra&amp;type=user-script"></script></head>
<body>
  <div class="wrap">
    <header>
      <h1>FHD 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options size" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options purpose" role="radiogroup" aria-label="모니터 용도 선택">
            <div class="radio">
              <input type="radio" id="pur-game" name="purpose" value="game">
              <label for="pur-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-work" name="purpose" value="work">
              <label for="pur-work">업무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-video" name="purpose" value="video">
              <label for="pur-video">영상 시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-all" name="purpose" value="all">
              <label for="pur-all">전부</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 가성비 픽, 프리미엄 픽 중에 무엇을 원하시나요?</legend>
          <div class="options pick" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="tier-value" name="tier" value="value">
              <label for="tier-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="tier-premium" name="tier" value="premium">
              <label for="tier-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="pick-hint" class="hint" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>조건에 맞는 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      SIZE_32: "https://link.coupang.com/a/eGhqJtSrtY",
      SIZE_24_GAME_VALUE: "https://link.coupang.com/a/eGhPbxr93Y",
      SIZE_24_CONTENT_VALUE: "https://link.coupang.com/a/eGhG4sqZX2",
      SIZE_24_GAME_PREMIUM: "https://link.coupang.com/a/eGhKBnox6y",
      SIZE_24_CONTENT_PREMIUM: "https://link.coupang.com/a/eGhxbiJWKa",
      SIZE_27_GAME_VALUE: "https://link.coupang.com/a/eGh7xdhtMO",
      SIZE_27_CONTENT_VALUE: "https://link.coupang.com/a/eGhXQIbqDI",
      SIZE_27_GAME_PREMIUM: "https://link.coupang.com/a/eGh2hhPusm",
      SIZE_27_CONTENT_PREMIUM: "https://link.coupang.com/a/eGhTfLdxbo"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const pickHintEl = document.getElementById('pick-hint');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function updatePickHint() {
      const tier = getValue('tier');

      if (tier === 'value') {
        pickHintEl.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.';
      } else if (tier === 'premium') {
        pickHintEl.textContent = '‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
      } else {
        pickHintEl.textContent = '';
      }
    }

    function resolveLink() {
      const size = getValue('size');
      const purpose = getValue('purpose');
      const tier = getValue('tier');

      if (!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if (size === '32') return LINKS.SIZE_32;
      if (!purpose) return { error: '모니터의 주 용도를 선택해 주세요.' };
      if (!tier) return { error: '원하시는 추천 유형을 선택해 주세요.' };

      const useGameLink = purpose === 'game' || purpose === 'all';
      const purposeKey = useGameLink ? 'GAME' : 'CONTENT';
      const tierKey = tier === 'premium' ? 'PREMIUM' : 'VALUE';
      const key = `SIZE_${size}_${purposeKey}_${tierKey}`;

      return LINKS[key] || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateButtonState() {
      const size = getValue('size');
      const purpose = getValue('purpose');
      const tier = getValue('tier');
      const ready = size === '32' || !!(size && purpose && tier);

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', function() {
      updatePickHint();
      updateButtonState();
    });

    updatePickHint();
    updateButtonState();

    goBtn.addEventListener('click', function() {
      const result = resolveLink();

      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
