<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>포터블 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 포터블 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 28px 18px 14px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 5.6vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 28px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(16px, 3vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 18px; }
    legend { font-weight: 700; margin-bottom: 10px; font-size: 16px; line-height: 1.35; }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .options.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .pick-note {
      min-height: 18px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      margin: -6px 0 16px;
      word-break: keep-all;
    }
    .pick-note:empty { display: none; }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer { text-align: center; padding: 10px 16px 24px; font-size: 12px; color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      header { padding: 22px 16px 12px; }
      .container { width: min(94vw, 900px); margin-bottom: 20px; padding: 16px; }
      fieldset { margin-bottom: 15px; }
      legend { font-size: 15px; margin-bottom: 8px; }
      .options { gap: 8px; }
      .radio label { min-height: 42px; padding: 10px 8px; font-size: 14px; border-radius: 11px; }
      .pick-note { font-size: 12px; margin: -4px 0 14px; }
      .actions { justify-content: stretch; margin-top: 12px; }
      .msg { width: 100%; text-align: center; }
      button.primary { width: 100%; padding: 13px 16px; }
      footer { padding-bottom: 18px; }
    }

    @media (max-width: 390px) {
      .container { padding: 14px; }
      .options { gap: 7px; }
      .radio label { min-height: 40px; padding: 9px 6px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>포터블 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 가성비 픽과 프리미엄 픽 중에 무엇을 선택 하실건가요?</legend>
          <div class="options two" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="pick-budget" name="pick" value="budget">
              <label for="pick-budget">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
        </fieldset>

        <p id="pick-note" class="pick-note" aria-live="polite"></p>

        <fieldset>
          <legend>2. 포터블 모니터를 어디에 연결 하실건가요?</legend>
          <div class="options" role="radiogroup" aria-label="연결 기기 선택">
            <div class="radio">
              <input type="radio" id="device-desktop" name="device" value="desktop">
              <label for="device-desktop">PC 데스크톱</label>
            </div>
            <div class="radio">
              <input type="radio" id="device-laptop" name="device" value="laptop">
              <label for="device-laptop">노트북</label>
            </div>
            <div class="radio">
              <input type="radio" id="device-console" name="device" value="console">
              <label for="device-console">콘솔 게임기</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 포터블 모니터로 게임을 하실 예정인가요?</legend>
          <div class="options two" role="radiogroup" aria-label="게임 이용 여부 선택">
            <div class="radio">
              <input type="radio" id="game-yes" name="game" value="yes">
              <label for="game-yes">한다</label>
            </div>
            <div class="radio">
              <input type="radio" id="game-no" name="game" value="no">
              <label for="game-no">안한다</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      BUDGET_DESKTOP: "https://link.coupang.com/a/dGF51IoQFg",
      PREMIUM_DESKTOP: "https://link.coupang.com/a/dGGG3AT3Gm",
      BUDGET_LAPTOP: "https://link.coupang.com/a/dGHjCEA8pE",
      PREMIUM_LAPTOP: "https://link.coupang.com/a/dGJqR6vFM4",
      BUDGET_GAME: "https://link.coupang.com/a/dGHYQj2KhE",
      PREMIUM_GAME: "https://link.coupang.com/a/dGIdCwt7PE"
    };

    const NOTES = {
      budget: "‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.",
      premium: "‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다."
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const pickNoteEl = document.getElementById('pick-note');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const pick = getValue('pick');
      const device = getValue('device');
      const game = getValue('game');

      if(!pick) return { error: '추천 유형을 선택해 주세요.' };
      if(!device) return { error: '연결 기기를 선택해 주세요.' };
      if(!game) return { error: '게임 이용 여부를 선택해 주세요.' };

      if(pick === 'budget'){
        if(device === 'console' || game === 'yes') return LINKS.BUDGET_GAME;
        if(device === 'desktop') return LINKS.BUDGET_DESKTOP;
        if(device === 'laptop') return LINKS.BUDGET_LAPTOP;
      }

      if(pick === 'premium'){
        if(device === 'console' || game === 'yes') return LINKS.PREMIUM_GAME;
        if(device === 'desktop') return LINKS.PREMIUM_DESKTOP;
        if(device === 'laptop') return LINKS.PREMIUM_LAPTOP;
      }

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updatePickNote(){
      const pick = getValue('pick');
      pickNoteEl.textContent = NOTES[pick] || '';
    }

    function updateButtonState(){
      const ready = !!(getValue('pick') && getValue('device') && getValue('game'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updatePickNote();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
