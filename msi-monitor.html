<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MSI 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 MSI 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: clamp(22px, 5vw, 32px) 18px 14px;
      text-align: center;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(24px, 5.6vw, 38px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(780px, 92vw);
      margin: 0 auto 28px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 22px;
    }

    fieldset:last-of-type { margin-bottom: 16px; }

    legend {
      font-weight: 800;
      margin-bottom: 12px;
      font-size: clamp(15px, 3.8vw, 17px);
      letter-spacing: -0.01em;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .options.purpose {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .radio { position: relative; }

    .radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      padding: 11px 10px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      line-height: 1.25;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }

    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label {
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(74,42,116,0.18);
      transform: translateY(-1px);
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .msg {
      flex: 1 1 180px;
      font-size: 13px;
      color: #a40000;
      min-height: 18px;
    }

    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    footer {
      text-align: center;
      padding: 10px 16px 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.86);
    }

    @media (max-width: 720px) {
      .container { margin-bottom: 20px; }
      .options,
      .options.purpose { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .radio label { min-height: 44px; padding: 10px 8px; font-size: 14px; }
      fieldset { margin-bottom: 18px; }
      .actions { justify-content: stretch; }
      .msg { flex-basis: 100%; text-align: center; }
      button.primary { width: 100%; padding: 14px 16px; }
    }

    @media (max-width: 360px) {
      header { padding-top: 18px; }
      .container { width: min(94vw, 780px); padding: 16px; }
      .radio label { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>MSI 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options purpose" role="radiogroup" aria-label="모니터 용도 선택">
            <div class="radio">
              <input type="radio" id="pur-office" name="purpose" value="office">
              <label for="pur-office">사무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-game" name="purpose" value="game">
              <label for="pur-game">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-video" name="purpose" value="video">
              <label for="pur-video">영상시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="pur-multi" name="purpose" value="multi">
              <label for="pur-multi">다목적</label>
            </div>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>선택을 완료하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      SIZE_32: "https://link.coupang.com/a/ezhYJb",
      SIZE_24: "https://link.coupang.com/a/ezja10",
      SIZE_27_GAME_MULTI: "https://link.coupang.com/a/eymEMx",
      SIZE_27_OFFICE_VIDEO: "https://link.coupang.com/a/ezi2Xt"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink() {
      const size = getValue('size');
      const purpose = getValue('purpose');

      if (!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if (size === '32') return LINKS.SIZE_32;
      if (size === '24') return LINKS.SIZE_24;

      if (!purpose) return { error: '모니터 용도를 선택해 주세요.' };
      if (purpose === 'game' || purpose === 'multi') return LINKS.SIZE_27_GAME_MULTI;
      if (purpose === 'office' || purpose === 'video') return LINKS.SIZE_27_OFFICE_VIDEO;

      return { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateButtonState() {
      const size = getValue('size');
      const purpose = getValue('purpose');
      const ready = size === '24' || size === '32' || (size === '27' && !!purpose);

      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function() {
      const result = resolveLink();
      if (typeof result === 'string') {
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if (result && result.error) {
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
