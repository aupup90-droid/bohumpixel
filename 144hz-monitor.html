<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>144hz 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 상황에 맞는 144hz 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: clamp(22px, 5vw, 32px) 16px 14px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(24px, 5.5vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(860px, 92vw);
      margin: 0 auto 24px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3vw, 28px);
      align-self: start;
    }

    fieldset { border: 0; padding: 0; margin: 0 0 20px; }
    fieldset:last-of-type { margin-bottom: 12px; }
    legend {
      font-weight: 700;
      margin-bottom: 11px;
      font-size: clamp(15px, 2.8vw, 16px);
      letter-spacing: -0.01em;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .options.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .hint {
      min-height: 18px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer {
      text-align: center;
      padding: 8px 16px 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 640px) {
      .wrap { min-height: 100svh; }
      header { padding: 24px 14px 12px; }
      .container {
        width: min(440px, 92vw);
        margin-bottom: 16px;
        padding: 16px;
        border-radius: 14px;
      }
      fieldset { margin-bottom: 16px; }
      .options,
      .options.two {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .radio label {
        min-height: 44px;
        padding: 10px 12px;
        font-size: 15px;
      }
      .hint {
        font-size: 12px;
        margin-top: 7px;
      }
      .actions {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr;
      }
      .msg { text-align: center; order: 2; min-height: 18px; }
      button.primary { width: 100%; padding: 13px 16px; }
      footer { padding-bottom: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>144hz 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 가성비 픽과 프리미엄 픽 중에 무엇을 선택 하실건가요?</legend>
          <div class="options two" role="radiogroup" aria-label="추천 유형 선택">
            <div class="radio">
              <input type="radio" id="pick-value" name="pick" value="value">
              <label for="pick-value">가성비 픽</label>
            </div>
            <div class="radio">
              <input type="radio" id="pick-premium" name="pick" value="premium">
              <label for="pick-premium">프리미엄 픽</label>
            </div>
          </div>
          <p id="pick-hint" class="hint" aria-live="polite"></p>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>사이즈와 픽을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      "24_value": "https://link.coupang.com/a/dYW9hiiAmq",
      "24_premium": "https://link.coupang.com/a/dYXh6MgvRs",
      "27_value": "https://link.coupang.com/a/dYUN4BkgCa",
      "27_premium": "https://link.coupang.com/a/dYVo5DjGzk",
      "32_value": "https://link.coupang.com/a/dYVABPUzhQ",
      "32_premium": "https://link.coupang.com/a/dYVVBJHQrY"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const pickHint = document.getElementById('pick-hint');

    function getValue(name){
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function resolveLink(){
      const size = getValue('size');
      const pick = getValue('pick');

      if(!size) return { error: '모니터 사이즈를 선택해 주세요.' };
      if(!pick) return { error: '가성비 픽 또는 프리미엄 픽을 선택해 주세요.' };

      const link = LINKS[`${size}_${pick}`];
      return link || { error: '선택값을 다시 확인해 주세요.' };
    }

    function updateHint(){
      const pick = getValue('pick');
      if(pick === 'value') {
        pickHint.textContent = '‘가성비 픽’은 가격에 중점을 둔 선택지로, 일부 품질과 안정성이 떨어질 수 있습니다.';
      } else if(pick === 'premium') {
        pickHint.textContent = '‘프리미엄 픽’은 품질과 안정성에 중점을 둔 선택지로, 가격대가 높을 수 있습니다.';
      } else {
        pickHint.textContent = '';
      }
    }

    function updateButtonState(){
      const ready = !!(getValue('size') && getValue('pick'));
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
      updateHint();
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function(){
      const result = resolveLink();
      if(typeof result === 'string'){
        const a = document.createElement('a');
        a.href = result;
        a.target = '_blank';
        a.rel = 'noopener noreferrer nofollow sponsored';
        document.body.appendChild(a);
        a.click();
        a.remove();
        msgEl.textContent = '';
      } else if(result && result.error){
        msgEl.textContent = result.error;
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
