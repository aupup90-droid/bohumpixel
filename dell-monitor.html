<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>델 모니터 추천가이드</title>
  <meta name="description" content="질문에 답하면 조건에 맞는 델 모니터 추천 링크로 이동합니다." />
  <style>
    :root {
      --bg: #cfa6e7;
      --card: #ffffff;
      --text: #1b1b1b;
      --muted: #5b5b5b;
      --primary: #4a2a74;
      --primary-contrast: #ffffff;
      --ring: rgba(74, 42, 116, 0.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, Apple SD Gothic Neo, "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 32px 20px 16px;
      text-align: center;
      color: #fff;
    }
    header h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      width: min(900px, 92vw);
      margin: 0 auto 36px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      padding: clamp(18px, 3.2vw, 28px);
    }

    fieldset { border: 0; padding: 0; margin: 0 0 22px; }
    legend { font-weight: 700; margin-bottom: 12px; font-size: 16px; }

    .options {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .radio { position: relative; }
    .radio input { position: absolute; opacity: 0; pointer-events: none; }
    .radio label {
      display: block;
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e5e5e8;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: box-shadow .2s ease, border-color .2s ease, transform .02s ease;
    }
    .radio label:hover { border-color: #d6d6db; }
    .radio input:focus-visible + label { outline: 0; box-shadow: 0 0 0 4px var(--ring); }
    .radio input:checked + label { border-color: var(--primary); box-shadow: 0 6px 18px rgba(74,42,116,0.18); transform: translateY(-1px); }

    .sub-question {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #eee7f8;
      border-radius: 14px;
      background: #faf7ff;
    }
    .sub-question[hidden] { display: none; }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    button.primary {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--primary);
      color: var(--primary-contrast);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(74,42,116,0.25);
      transition: transform .06s ease, box-shadow .2s ease, opacity .2s ease;
    }
    button.primary:hover { box-shadow: 0 16px 32px rgba(74,42,116,0.32); }
    button.primary:active { transform: translateY(1px); }
    button[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .msg { font-size: 13px; color: #a40000; }

    footer {
      text-align: center;
      padding: 12px 16px 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    @media (max-width: 780px) {
      .options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>델 모니터 추천가이드</h1>
    </header>

    <main class="container" role="main">
      <form id="guide-form" novalidate>
        <fieldset>
          <legend>1. 어떤 사이즈의 모니터를 원하시나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 사이즈 선택">
            <div class="radio">
              <input type="radio" id="size-24" name="size" value="24">
              <label for="size-24">24인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-27" name="size" value="27">
              <label for="size-27">27인치</label>
            </div>
            <div class="radio">
              <input type="radio" id="size-32" name="size" value="32">
              <label for="size-32">32인치</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>2. 원하시는 해상도는 어떻게 되나요?</legend>
          <div class="options" role="radiogroup" aria-label="해상도 선택">
            <div class="radio">
              <input type="radio" id="res-fhd" name="resolution" value="fhd">
              <label for="res-fhd">FHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-qhd" name="resolution" value="qhd">
              <label for="res-qhd">QHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-uhd" name="resolution" value="uhd">
              <label for="res-uhd">UHD</label>
            </div>
            <div class="radio">
              <input type="radio" id="res-unknown" name="resolution" value="unknown">
              <label for="res-unknown">모르겠음</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>3. 모니터의 주 용도는 어떻게 되나요?</legend>
          <div class="options" role="radiogroup" aria-label="모니터 용도 선택">
            <div class="radio">
              <input type="radio" id="purpose-office" name="purpose" value="office">
              <label for="purpose-office">사무 및 웹서핑</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-gaming" name="purpose" value="gaming">
              <label for="purpose-gaming">게이밍</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-video" name="purpose" value="video">
              <label for="purpose-video">영상시청</label>
            </div>
            <div class="radio">
              <input type="radio" id="purpose-design" name="purpose" value="design">
              <label for="purpose-design">시각디자인</label>
            </div>
          </div>

          <div id="office-sub" class="sub-question" hidden>
            <fieldset>
              <legend>‘눈의 편안함’과 ‘저렴한 가격’ 둘 중에 하나를 고른다면?</legend>
              <div class="options" role="radiogroup" aria-label="사무 및 웹서핑 세부 선택">
                <div class="radio">
                  <input type="radio" id="office-comfort" name="officePreference" value="comfort">
                  <label for="office-comfort">눈의 편안함</label>
                </div>
                <div class="radio">
                  <input type="radio" id="office-price" name="officePreference" value="price">
                  <label for="office-price">저렴한 가격</label>
                </div>
              </div>
            </fieldset>
          </div>

          <div id="gaming-sub" class="sub-question" hidden>
            <fieldset>
              <legend>‘강렬한 색감’과 ‘저렴한 가격’ 둘 중에 하나를 고른다면?</legend>
              <div class="options" role="radiogroup" aria-label="게이밍 세부 선택">
                <div class="radio">
                  <input type="radio" id="gaming-color" name="gamingPreference" value="color">
                  <label for="gaming-color">강렬한 색감</label>
                </div>
                <div class="radio">
                  <input type="radio" id="gaming-price" name="gamingPreference" value="price">
                  <label for="gaming-price">저렴한 가격</label>
                </div>
              </div>
            </fieldset>
          </div>
        </fieldset>

        <div class="actions">
          <span id="msg" class="msg" role="status" aria-live="polite"></span>
          <button id="go" class="primary" type="button" aria-label="추천 보기">추천 보러가기</button>
        </div>
      </form>
    </main>

    <footer>
      <span>모든 항목을 선택하면 추천 링크로 이동합니다.</span>
    </footer>
  </div>

  <noscript>이 가이드는 자바스크립트를 필요로 합니다. 브라우저 설정에서 자바스크립트를 활성화해 주세요.</noscript>

  <script>
    const LINKS = {
      LINK_24_GENERAL: "https://link.coupang.com/a/cQ8CDZ",
      LINK_24_OFFICE_PRICE: "https://link.coupang.com/a/cQ8DhD",
      LINK_24_GAMING: "https://link.coupang.com/a/eqDRLJ",
      LINK_27_GENERAL: "https://link.coupang.com/a/eqBVdG",
      LINK_27_OFFICE_PRICE: "https://link.coupang.com/a/eqEbrZ",
      LINK_27_GAMING_COLOR: "https://link.coupang.com/a/eqCnFB",
      LINK_27_GAMING_PRICE: "https://link.coupang.com/a/eqD6hf",
      LINK_32_GENERAL: "https://link.coupang.com/a/eqB06Q",
      LINK_32_GAMING: "https://link.coupang.com/a/eqCqu2"
    };

    const form = document.getElementById('guide-form');
    const msgEl = document.getElementById('msg');
    const goBtn = document.getElementById('go');
    const officeSub = document.getElementById('office-sub');
    const gamingSub = document.getElementById('gaming-sub');

    function getValue(name) {
      const el = form.querySelector(`input[name="${name}"]:checked`);
      return el ? el.value : null;
    }

    function clearRadioGroup(name) {
      form.querySelectorAll(`input[name="${name}"]`).forEach(input => {
        input.checked = false;
      });
    }

    function syncConditionalQuestions() {
      const purpose = getValue('purpose');
      const showOffice = purpose === 'office';
      const showGaming = purpose === 'gaming';

      officeSub.hidden = !showOffice;
      gamingSub.hidden = !showGaming;

      if (!showOffice) clearRadioGroup('officePreference');
      if (!showGaming) clearRadioGroup('gamingPreference');
    }

    function isComplete() {
      const size = getValue('size');
      const resolution = getValue('resolution');
      const purpose = getValue('purpose');
      const officePreference = getValue('officePreference');
      const gamingPreference = getValue('gamingPreference');

      if (!size || !resolution || !purpose) return false;
      if (purpose === 'office' && !officePreference) return false;
      if (purpose === 'gaming' && !gamingPreference) return false;
      return true;
    }

    function resolveLink() {
      const size = getValue('size');
      const purpose = getValue('purpose');
      const officePreference = getValue('officePreference');
      const gamingPreference = getValue('gamingPreference');

      if (size === '24') {
        if (purpose === 'office' && officePreference === 'comfort') return LINKS.LINK_24_GENERAL;
        if (purpose === 'office' && officePreference === 'price') return LINKS.LINK_24_OFFICE_PRICE;
        if (purpose === 'gaming') return LINKS.LINK_24_GAMING;
        if (purpose === 'video') return LINKS.LINK_24_GENERAL;
        if (purpose === 'design') return LINKS.LINK_24_GENERAL;
      }

      if (size === '27') {
        if (purpose === 'office' && officePreference === 'comfort') return LINKS.LINK_27_GENERAL;
        if (purpose === 'office' && officePreference === 'price') return LINKS.LINK_27_OFFICE_PRICE;
        if (purpose === 'gaming' && gamingPreference === 'color') return LINKS.LINK_27_GAMING_COLOR;
        if (purpose === 'gaming' && gamingPreference === 'price') return LINKS.LINK_27_GAMING_PRICE;
        if (purpose === 'video') return LINKS.LINK_27_GENERAL;
        if (purpose === 'design') return LINKS.LINK_27_GENERAL;
      }

      if (size === '32') {
        if (purpose === 'office') return LINKS.LINK_32_GENERAL;
        if (purpose === 'gaming') return LINKS.LINK_32_GAMING;
        if (purpose === 'video') return LINKS.LINK_32_GENERAL;
        if (purpose === 'design') return LINKS.LINK_32_GENERAL;
      }

      return null;
    }

    function updateButtonState() {
      syncConditionalQuestions();
      const ready = isComplete();
      goBtn.disabled = !ready;
      msgEl.textContent = ready ? '' : '필수 항목을 선택해 주세요.';
    }

    form.addEventListener('change', updateButtonState);
    updateButtonState();

    goBtn.addEventListener('click', function () {
      const result = resolveLink();
      if (!result) {
        msgEl.textContent = '선택값을 다시 확인해 주세요.';
        goBtn.disabled = false;
        return;
      }

      const a = document.createElement('a');
      a.href = result;
      a.target = '_blank';
      a.rel = 'noopener noreferrer nofollow sponsored';
      document.body.appendChild(a);
      a.click();
      a.remove();
      msgEl.textContent = '';
    });
  </script>
</body>
</html>
